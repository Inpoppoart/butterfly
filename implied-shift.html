<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#05060a">
<title>SHIFT — Implied Price Shift Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05060a;--panel:#0d1120;--panel2:#131a2e;
  --border:#1d2740;--border2:#2b3a5e;--text:#cdd8f0;--muted:#5a6b92;
  --green:#39ff8b;--gold:#ffd23f;--cyan:#5bd1ff;--red:#ff4d5e;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
  --sans:Inter,-apple-system,system-ui,sans-serif;
  /* heat-map: diverging red↔blue, neutral midpoint — validated for CVD + dark surface */
  --heat-w3:#e66767;--heat-w2:#b84a4a;--heat-w1:#7a3b3b;
  --heat-mid:#383835;
  --heat-s1:#184f95;--heat-s2:#2a78d6;--heat-s3:#5598e7;
}
html,body{height:100%}
body{background:radial-gradient(1200px 600px at 50% -10%,#0e1d38 0%,transparent 60%),var(--bg);
  color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased}
.app{max-width:1020px;margin:0 auto;padding:.9rem .9rem 3rem}
.hdr{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--border);
  padding-bottom:.5rem;margin-bottom:.8rem}
.hdr h1{font-family:var(--mono);font-size:1.05rem;letter-spacing:.14em;color:var(--green)}
.hdr .sub{font-family:var(--mono);font-size:.7rem;color:var(--muted)}
.hud{display:flex;gap:1.1rem;font-family:var(--mono);font-size:.75rem;color:var(--muted);margin-bottom:.7rem;flex-wrap:wrap}
.hud b{color:var(--text)}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:.7rem .9rem;margin-bottom:.7rem}
.panel-title{font-family:var(--mono);font-size:.62rem;letter-spacing:.18em;color:var(--muted);margin-bottom:.45rem}
.panel-title .conv{color:var(--cyan)}
.row{display:flex;align-items:baseline;gap:.9rem;padding:.28rem .5rem;border-radius:6px;border-left:3px solid transparent}
.row.leg{border-left-color:var(--border2);background:rgba(43,58,94,.14)}
.row.hot{animation:rowHot 2s ease-out}
@keyframes rowHot{0%{background:rgba(255,210,63,.22);border-left-color:var(--gold)}
  70%{background:rgba(255,210,63,.10);border-left-color:var(--gold)}100%{background:transparent}}
.tenor{font-family:var(--mono);font-weight:700;color:var(--gold);width:4.4rem;font-size:1rem}
.mkt{font-family:var(--mono);font-size:1.25rem;font-weight:600;white-space:nowrap}
.mkt .slash{color:var(--muted);font-weight:400}
.px{display:inline-block;padding:0 .15rem;border-radius:4px}
.px.flash-up{animation:flashUp 2s ease-out}
.px.flash-down{animation:flashDown 2s ease-out}
@keyframes flashUp{0%{background:rgba(57,255,139,.55);color:#04180c}60%{background:rgba(57,255,139,.18)}100%{background:transparent}}
@keyframes flashDown{0%{background:rgba(255,77,94,.55);color:#1c0407}60%{background:rgba(255,77,94,.18)}100%{background:transparent}}
.was{font-family:var(--mono);font-size:.72rem;color:var(--muted);margin-left:.3rem}
.screen{margin-bottom:.7rem;background:#000;border:1px solid #262c44;border-radius:8px;overflow:hidden}
.shead{display:grid;grid-template-columns:1.2rem minmax(2rem,1fr) auto auto auto minmax(2rem,1fr) 1.2rem;
  gap:.5rem;align-items:center;padding:.28rem .65rem;border-radius:6px;background:var(--panel2);
  font-family:var(--mono);font-size:.55rem;letter-spacing:.12em;color:var(--muted);margin-bottom:.45rem}
.shead span:nth-child(4){text-align:center}
.shead .r{text-align:right}
.pad{background:#000;border:0;border-radius:0;margin:0;overflow:hidden}
.tenor-hd{display:none}
.rule{height:0;border-top:1px solid rgba(207,214,228,.55);margin:0}
.srow{display:grid;grid-template-columns:2.3rem minmax(2rem,1fr) auto 3px auto minmax(2rem,1fr) 2.3rem;
  gap:.5rem;align-items:center;padding:.28rem .65rem;border-radius:0}
.srow.mktrow{background:#0e1636}
.srow.mktrow .slab{color:#ffd23f}
.srow.bar{background:linear-gradient(180deg,#2137e4,#141fb4);grid-template-columns:1.2rem minmax(2rem,1fr) auto auto auto minmax(2rem,1fr) 1.2rem;padding:.26rem .65rem}
.tenor-mid{font-family:var(--mono);font-weight:700;color:#49ff62;font-size:1rem;letter-spacing:.06em;text-align:center;padding:0 .55rem;white-space:nowrap}
.srow.bar .slab{color:#49ff62;font-size:.92rem;letter-spacing:.05em}
.srow.bar .sprice{color:#ffe89c}
.srow.bar .sname{color:#cfeaff}
.srow.bar .sep{background:#8b9bff;box-shadow:none}
.pad .srow:not(.bar){border-top:1px solid rgba(207,214,228,.5)}
.pad .srow:not(.bar):first-child{border-top:0}
.srow.target{background:rgba(91,209,255,.10);outline:2px solid rgba(91,209,255,.55);outline-offset:-2px}
.srow.dimmed{opacity:.35}
.srow.shocked{background:rgba(255,210,63,.08);outline:1px solid rgba(255,210,63,.5);outline-offset:-1px}
.sprice.chg{background:rgba(255,210,63,.16);outline:1px solid rgba(255,210,63,.55)}
.task{display:flex;align-items:center;gap:.8rem;background:rgba(91,209,255,.06);border:1px solid rgba(91,209,255,.45);
  border-radius:10px;padding:.55rem .9rem;margin-bottom:.7rem}
.task-label{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;color:#04121c;background:var(--cyan);
  border-radius:4px;padding:.15rem .4rem;font-weight:700;white-space:nowrap}
.task-text{font-family:var(--mono);font-size:.98rem;font-weight:600}
.task-text b{color:var(--cyan)}
.task-was{color:var(--muted);font-weight:400;font-size:.8rem;margin-left:.4rem;white-space:nowrap}
.mkt-sm{font-family:var(--mono);font-size:.85rem;font-weight:600}
.anshdr{font-family:var(--mono);font-size:.62rem;letter-spacing:.18em;color:var(--cyan)}
.slab{font-family:var(--mono);font-weight:700;font-size:.72rem;color:#5bd1ff;white-space:nowrap}
.slab.r{text-align:right}
.slab .tgt{color:var(--gold);font-size:.48rem;letter-spacing:.1em;border:1px solid rgba(255,210,63,.5);border-radius:4px;padding:0 .18rem;margin-left:.2rem}
.sname{font-family:var(--mono);font-size:.57rem;color:#59d0ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase}
.sname.l{text-align:right}
.sprice{font-family:var(--mono);font-size:1.12rem;font-weight:600;white-space:nowrap;border-radius:4px;padding:0 .12rem;color:#f2f5ff}
.sprice.off{text-align:right}
.sprice.dim{color:#333f5c}
.pxf{font-size:.58em;position:relative;top:-.42em;margin-left:.1em;font-weight:700}
.tick{color:#5bd1ff;font-size:.75em;position:relative;top:-.35em;margin-left:.06em;font-weight:700}
.sep{width:3px;align-self:stretch;background:#8fa2d8;border-radius:2px;box-shadow:0 0 5px rgba(143,162,216,.35)}
.btn{font-family:var(--mono);font-size:.78rem;font-weight:600;color:var(--text);background:var(--panel2);
  border:1px solid var(--border2);border-radius:8px;padding:.5rem 1rem;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn:hover{border-color:var(--cyan)}
.btn:active{transform:translateY(1px)}
.btn.primary{color:#04180c;background:var(--green);border-color:var(--green);font-weight:700;font-size:.9rem}
.btn.end{padding:.28rem .7rem;font-size:.68rem}
.btnrow{display:flex;gap:.6rem;margin-top:.45rem;flex-wrap:wrap}
.optbtn{cursor:pointer;border:1px solid var(--border);border-radius:6px;padding:.2rem .5rem;display:inline-block;
  margin:.15rem .35rem .15rem 0;-webkit-tap-highlight-color:transparent}
.optbtn:hover{border-color:var(--cyan)}
.implied-wrap{display:flex;gap:.7rem;flex-wrap:wrap}
.implied{flex:1 1 200px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:.6rem .8rem;margin-bottom:.7rem}
.implied.target{border-color:var(--border2);box-shadow:0 0 12px rgba(91,209,255,.12)}
.imp-head{font-family:var(--mono);font-size:.8rem;color:var(--gold);display:flex;gap:.6rem;align-items:baseline;flex-wrap:wrap}
.imp-head .formula{color:var(--muted);font-size:.68rem}
.imp-head .tgt{color:var(--cyan);font-size:.62rem;letter-spacing:.18em;border:1px solid var(--border2);border-radius:4px;padding:0 .3rem}
.imp-mkt{font-family:var(--mono);font-size:1.7rem;font-weight:700;margin:.15rem 0;white-space:nowrap}
.imp-mkt .slash{color:var(--muted);font-weight:400}
.imp-note{font-family:var(--mono);font-size:.62rem;color:var(--muted)}
.shock{display:flex;align-items:center;gap:.8rem;background:var(--panel2);border:1px solid var(--border2);
  border-radius:10px;padding:.6rem .9rem;margin-bottom:.7rem}
.shock-label{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;color:var(--bg);
  background:var(--gold);border-radius:4px;padding:.15rem .4rem;font-weight:700}
.shock-text{font-family:var(--mono);font-size:1.05rem;font-weight:600}
.clock{margin-left:auto;font-family:var(--mono);font-size:1rem;color:var(--red);font-weight:700}
.ansform{display:flex;flex-direction:column;gap:.35rem;margin-bottom:.7rem}
.ansform input{font-family:var(--mono);font-size:1.35rem;font-weight:600;color:var(--text);
  background:var(--panel);border:1px solid var(--border2);border-radius:10px;padding:.55rem .8rem;width:100%;outline:none}
.ansform input:focus{border-color:var(--cyan);box-shadow:0 0 10px rgba(91,209,255,.15)}
.hint{font-family:var(--mono);font-size:.68rem;color:var(--muted)}
.choices{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.5rem}
.choice{display:flex;align-items:baseline;gap:.9rem;background:var(--panel);border:1px solid var(--border2);
  border-radius:10px;padding:.5rem .8rem;cursor:pointer}
.choice:hover{border-color:var(--cyan);box-shadow:0 0 8px rgba(91,209,255,.12)}
.cnum{font-family:var(--mono);font-weight:700;color:var(--green);font-size:1.05rem;min-width:1.2rem}
.err{font-family:var(--mono);font-size:.75rem;color:var(--red)}
.fb{border-radius:10px;padding:.7rem .9rem;margin-bottom:.7rem;border:1px solid}
.fb.ok{background:rgba(57,255,139,.07);border-color:rgba(57,255,139,.4)}
.fb.bad{background:rgba(255,77,94,.07);border-color:rgba(255,77,94,.45)}
.fb-line1{font-family:var(--mono);font-size:.95rem;font-weight:700;display:flex;gap:1rem;align-items:baseline;flex-wrap:wrap}
.fb.ok .verdict{color:var(--green)}.fb.bad .verdict{color:var(--red)}
.fb-line1 .ms{color:var(--cyan);font-weight:400;font-size:.8rem}
.fb-line1 .stk{color:var(--muted);font-weight:400;font-size:.8rem}
.fb-ans{font-family:var(--mono);font-size:1.5rem;font-weight:700;margin:.25rem 0}
.fb-deriv{font-size:.85rem;color:var(--text);opacity:.9;margin:.2rem 0}
.fb-swap{font-family:var(--mono);font-size:.75rem;color:var(--gold)}
.fb-next{font-family:var(--mono);font-size:.7rem;color:var(--muted);margin-top:.3rem}
.keysbar{font-family:var(--mono);font-size:.65rem;color:var(--muted);text-align:center;margin-top:.4rem}
.keysbar b{color:var(--text)}
.menu .lvl{display:flex;gap:.8rem;align-items:baseline;padding:.5rem .6rem;border:1px solid var(--border);
  border-radius:8px;margin-bottom:.5rem;background:var(--panel)}
.menu .lvl .num{font-family:var(--mono);font-weight:700;color:var(--green);font-size:1.1rem}
.menu .lvl .nm{font-family:var(--mono);font-weight:600;color:var(--gold);width:6.5rem}
.menu .lvl .ds{font-size:.8rem;color:var(--muted)}
.menu .opt{font-family:var(--mono);font-size:.8rem;color:var(--muted);margin-top:.6rem}
.menu .opt b{color:var(--cyan)}
.tiles{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:.8rem}
.tile{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:.5rem .8rem;min-width:100px;text-align:center}
.tile .v{font-family:var(--mono);font-size:1.4rem;font-weight:700;color:var(--green)}
.tile .l{font-family:var(--mono);font-size:.58rem;letter-spacing:.14em;color:var(--muted);margin-top:.15rem}
.heat{border-collapse:separate;border-spacing:2px;width:100%;font-family:var(--mono)}
.heat th{font-size:.58rem;letter-spacing:.08em;color:var(--muted);font-weight:400;padding:.2rem .3rem;text-align:center}
.heat th.rowlab{text-align:left}
.heat td.rowlab{font-size:.68rem;color:var(--text);padding:.2rem .4rem;white-space:nowrap}
.heat td.cell{width:23%;text-align:center;border-radius:5px;padding:.3rem .2rem}
.heat td.cell .a{font-size:.85rem;font-weight:700}
.heat td.cell .m{font-size:.58rem;opacity:.85}
.heat td.cell.empty{background:var(--panel);border:1px solid var(--border);color:var(--muted)}
.legend{display:flex;align-items:center;gap:.35rem;font-family:var(--mono);font-size:.6rem;color:var(--muted);margin-top:.5rem;flex-wrap:wrap}
.legend .sw{width:22px;height:12px;border-radius:3px;display:inline-block}
.testfail{background:rgba(255,77,94,.12);border:1px solid var(--red);border-radius:8px;padding:.6rem .8rem;
  font-family:var(--mono);font-size:.75rem;color:var(--red);margin-bottom:.8rem;white-space:pre-wrap}
.loadfail{font-family:var(--mono);color:var(--red);padding:2rem;text-align:center}
</style>

<script type="text/babel" data-presets="react">
/* =====================================================================
   SHIFT — implied price shift trainer.
   Quote convention: OFFER / BID (offer = pay side, higher, shown first;
   bid = receive side, lower, shown second). Toggleable to bid/offer.
   All prices are integers in 16ths of a basis point; ticks are 1/8 bp.
   ===================================================================== */

// ==PURE-BEGIN== (plain JS, no JSX — extracted and run under node for tests)

// ---- price math ----
function toSixteenths(whole, eighths){ return whole*16 + (eighths||0)*2; }
function fromDecimal(dec){
  const v = dec*16, r = Math.round(v);
  return Math.abs(v-r) < 1e-6 ? r : null;
}
function formatPrice(s16){
  const neg = s16 < 0, a = Math.abs(s16);
  const whole = Math.floor(a/16), rem = a%16;
  if (!rem) return (neg?'-':'') + whole;
  if (rem % 4 === 0)                               // quarters print as decimals: 143.75
    return (neg?'-':'') + whole + '.' + (rem === 8 ? '5' : rem/16*100);
  let num = rem, den = 16;
  while (num % 2 === 0){ num /= 2; den /= 2; }     // 10/16 → 5/8; odd eighths stay fractions
  return (neg?'-':'') + whole + ' ' + num + '/' + den;
}
// display split for the board: quarters as small raised digits (143⁷⁵ style)
function priceParts(s16){
  const neg = s16 < 0, a = Math.abs(s16);
  const whole = Math.floor(a/16), rem = a%16;
  const w = (neg?'-':'') + whole;
  if (!rem) return { w: w, sup: null };
  if (rem % 4 === 0) return { w: w, sup: String(rem/16*100) };   // 25 / 50 / 75
  if (rem % 2 === 0) return { w: w, sup: (rem/2) + '/8' };
  return { w: w, sup: rem + '/16' };
}

// ---- markets & structures ----
// market: {bid, offer} in 16ths, bid < offer. bid = receive side, offer = pay side.
function deriveImplied(st, board){
  if (st.type === 'spread'){
    const n = board[st.near], f = board[st.far];
    return { bid: f.bid - n.offer, offer: f.offer - n.bid };
  }
  if (st.type === 'fly'){
    const n = board[st.near], b = board[st.belly], f = board[st.far];
    return { bid: 2*b.bid - n.offer - f.offer, offer: 2*b.offer - n.bid - f.bid };
  }
  const a = board[st.leg1], b = board[st.leg2];
  return { bid: a.bid + b.bid, offer: a.offer + b.offer };
}
function structLegs(st){
  if (st.type === 'spread') return [{role:'near',key:st.near},{role:'far',key:st.far}];
  if (st.type === 'fly') return [{role:'nearWing',key:st.near},{role:'belly',key:st.belly},{role:'farWing',key:st.far}];
  return [{role:'leg1',key:st.leg1},{role:'leg2',key:st.leg2}];
}
// shock: {key, side:'bid'|'offer', dir:'improve'|'worsen', size} — size in 16ths.
// improve = market tightens (bid up / offer down); worsen = widens.
function applyShock(board, shock){
  const m = board[shock.key];
  let bid = m.bid, offer = m.offer;
  if (shock.side === 'bid') bid += (shock.dir === 'improve' ? shock.size : -shock.size);
  else offer += (shock.dir === 'improve' ? -shock.size : shock.size);
  const next = Object.assign({}, board);
  next[shock.key] = { bid, offer };
  return next;
}

// ---- answer parsing ----
// A single price token: "50 5/8" | "50.625" | "51" (whole bp) | "5" (eighths
// shorthand, resolved to the price nearest prevS16 with that displayed eighth).
function parsePrice(tok, prevS16){
  tok = tok.trim();
  let m;
  if ((m = tok.match(/^(-?)(\d+)\s+(\d{1,2})\/(2|4|8|16)$/))){   // "50 1/2", "51 3/4", "45 5/8"
    const num = +m[3], den = +m[4];
    if (num >= den || (num*16) % den) return null;
    return (m[1]?-1:1) * ((+m[2])*16 + num*(16/den));
  }
  if (/^-?\d+\.\d+$/.test(tok)) return fromDecimal(parseFloat(tok));
  // fraction-only ("5/8", "1/2") or bare eighth digit: with a reference price
  // it's shorthand for the nearest price carrying that fraction
  let sh = null;
  if (/^[0-7]$/.test(tok) && prevS16 != null) sh = (+tok)*2;
  else if ((m = tok.match(/^(\d{1,2})\/(2|4|8|16)$/))){
    const num = +m[1], den = +m[2];
    if (num < den && (num*16) % den === 0) sh = num*(16/den);
  }
  if (sh != null){
    if (prevS16 == null) return /\//.test(tok) ? sh : parseInt(tok,10)*16;
    let best = null;
    for (let c = prevS16-16; c <= prevS16+16; c++){
      if (Math.abs(c)%16 !== sh) continue;
      if (best === null || Math.abs(c-prevS16) < Math.abs(best-prevS16)) best = c;
    }
    return best;
  }
  if (/^-?\d+$/.test(tok)) return parseInt(tok,10)*16;
  return null;
}
// Split "51 1/2 / 50 5/8", "51.5/50.625", "4/5", "4 5" into two price tokens.
function splitAnswer(text){
  const t = text.trim();
  if (!t) return null;
  if (t.indexOf(' / ') >= 0){                       // spaced slash is unambiguous
    const pp = t.split(' / ');
    if (pp.length === 2 && pp[0].trim() && pp[1].trim())
      return [pp[0].trim(), pp[1].trim()];
  }
  const prot = t.replace(/(?<![\d.])(\d{1,2})\s*\/\s*(2|4|8|16)\b(?!\.)/g, '$1_$2');
  let parts = prot.split(/\s*[\/,;]\s*/).filter(function(s){ return s.trim() !== ''; });
  if (parts.length === 1){
    const mm = prot.match(/^([0-7])\s+([0-7])$/);
    if (mm) parts = [mm[1], mm[2]];
  }
  if (parts.length !== 2) return null;
  return parts.map(function(p){ return p.replace(/_(2|4|8|16)/g, '/$1').trim(); });
}
// conv 'ob' → typed order is offer then bid; 'bo' → bid then offer.
// prev = previous implied {bid, offer} (for shorthand handle resolution).
function parseAnswer(text, conv, prev){
  if (/^u(nch(anged)?)?$/i.test(text.trim())) return { kind:'unchanged' };
  const parts = splitAnswer(text);
  if (!parts) return null;
  const first = conv === 'ob' ? 'offer' : 'bid';
  const second = conv === 'ob' ? 'bid' : 'offer';
  const p1 = parsePrice(parts[0], prev ? prev[first] : null);
  const p2 = parsePrice(parts[1], prev ? prev[second] : null);
  if (p1 === null || p2 === null) return null;
  const out = { kind:'market' };
  out[first] = p1; out[second] = p2;
  return out;
}

// ---- board generation ----
// Real JPY IRS levels (bp): TONA ~0.977% anchors the front end; curve from the
// desk's spread/fly grid (2x5 = 49, 5x7 = 24.75, 7x10 = 32.125, 2x10 = 105.875).
var TENORS = [
  {k:'2y', mid:141.625}, {k:'5y', mid:190.625},
  {k:'10y', mid:247.5}, {k:'20y', mid:313.125}
];
function ri(a,b){ return a + Math.floor(Math.random()*(b-a+1)); }
function pick(a){ return a[ri(0,a.length-1)]; }
function sl(k){ return k.replace('y','') + 's'; }   // '10y' → '10s'

function mkTwoWay(midBp){
  const mid16 = Math.round(midBp*8)*2;              // eighth-aligned 16ths
  const w = pick([4,6,8]);
  const bid = mid16 - (w===6 ? 2 : w/2);
  return { bid: bid, offer: bid + w };
}
function genOutrights(){
  const board = {};
  let prevMid = -1e9;
  TENORS.forEach(function(t){
    let mid = t.mid + (Math.random()*2 - 1);        // ±1bp of drift, eighth-aligned
    if (mid < prevMid + 8) mid = prevMid + 8;       // keep the curve rising
    prevMid = mid;
    board[t.k] = mkTwoWay(mid);
  });
  return board;
}
var SPREAD_KEYS = [];
for (let i = 0; i < TENORS.length-1; i++) SPREAD_KEYS.push(sl(TENORS[i].k) + sl(TENORS[i+1].k));
function genSpreadBoard(){
  const board = {};
  for (let i = 0; i < TENORS.length-1; i++){
    const mid = (TENORS[i+1].mid - TENORS[i].mid) + (Math.random()*2 - 1);
    const mid16 = Math.round(mid*8)*2;
    const w = pick([4,6]);
    const bid = mid16 - (w===6 ? 2 : w/2);
    board[SPREAD_KEYS[i]] = { bid: bid, offer: bid + w };
  }
  return board;
}
function mkSpread(nearK, farK){ return { type:'spread', near:nearK, far:farK, label: sl(nearK)+sl(farK) }; }
function mkFly(nK, bK, fK){ return { type:'fly', near:nK, belly:bK, far:fK, label: sl(nK)+sl(bK)+sl(fK) }; }
function pickPair(){ const i = ri(0, TENORS.length-2), j = ri(i+1, TENORS.length-1); return [TENORS[i].k, TENORS[j].k]; }
function pickTriple(){
  const idx = [];
  while (idx.length < 3){ const v = ri(0, TENORS.length-1); if (idx.indexOf(v) < 0) idx.push(v); }
  idx.sort(function(a,b){ return a-b; });
  return idx.map(function(i){ return TENORS[i].k; });
}
function genRound(level){
  if (level === 4){
    const board = genSpreadBoard();
    const i = ri(0, SPREAD_KEYS.length-2);
    const st = { type:'chain', leg1: SPREAD_KEYS[i], leg2: SPREAD_KEYS[i+1],
                 label: sl(TENORS[i].k) + sl(TENORS[i+2].k) };
    return { board: board, boardKeys: [st.leg1, st.leg2], structures: [st], boardKind: 'SPREAD MARKETS' };
  }
  const board = genOutrights();
  const keys = TENORS.map(function(t){ return t.k; });
  if (level === 2){
    const p = pickPair();
    return { board: board, boardKeys: [p[0], p[1]], structures: [mkSpread(p[0], p[1])], boardKind: 'OUTRIGHTS' };
  }
  if (level === 3){
    const t = pickTriple();
    return { board: board, boardKeys: t.slice(), structures: [mkFly(t[0], t[1], t[2])], boardKind: 'OUTRIGHTS' };
  }
  const p1 = pickPair(); const s1 = mkSpread(p1[0], p1[1]);
  const t3 = pickTriple(); const f = mkFly(t3[0], t3[1], t3[2]);
  let s2 = s1;
  for (let g = 0; g < 30 && s2.label === s1.label; g++){ const p2 = pickPair(); s2 = mkSpread(p2[0], p2[1]); }
  const structures = s2.label === s1.label ? [s1, f] : [s1, f, s2];
  // only tenors that leg at least one visible structure make the board;
  // distractor shocks then always hit a leg of some OTHER structure
  const used = keys.filter(function(k){
    return structures.some(function(st){
      return structLegs(st).some(function(l){ return l.key === k; });
    });
  });
  return { board: board, boardKeys: used, structures: structures, boardKind: 'OUTRIGHTS' };
}

// ---- adaptive question sampling ----
function patKey(type, role, side, dir){ return type + '|' + role + '|' + side + '|' + dir; }
function median(a){
  if (!a.length) return 0;
  const s = a.slice().sort(function(x,y){ return x-y; });
  const m = s.length >> 1;
  return s.length % 2 ? s[m] : (s[m-1]+s[m])/2;
}
function comboWeight(stats, key){
  const s = stats[key];
  if (!s || !s.n) return 2;                          // unseen: explore
  const acc = s.ok / s.n;
  let w = 0.5 + 3*(1-acc);
  w += Math.max(0, Math.min(1.5, median(s.times)/8000 - 0.5));   // slow → resurface
  if (s.lastWrong) w += 1.5;                         // just missed → resurface soon
  return Math.max(0.25, w);
}
function weightedPick(items, weights){
  let tot = 0;
  for (let i = 0; i < weights.length; i++) tot += weights[i];
  let r = Math.random()*tot;
  for (let i = 0; i < items.length; i++){ r -= weights[i]; if (r <= 0) return items[i]; }
  return items[items.length-1];
}
function legalSizes(mkt, side, dir){
  const w = mkt.offer - mkt.bid;
  return [2,4].filter(function(s){
    if (dir === 'improve') return w - s >= 2;        // never lock/cross the market
    return w + s <= 12;                              // don't drift absurdly wide
  });
}
function recordResult(stats, key, ok, ms){
  const s = stats[key] || (stats[key] = { n:0, ok:0, times:[] });
  s.n++; if (ok) s.ok++;
  s.lastWrong = !ok;
  s.times.push(ms);
  if (s.times.length > 50) s.times.shift();
}
function genQuestion(opts){
  const st = opts.structures[opts.targetIdx];
  const legs = structLegs(st);
  const legKeys = legs.map(function(l){ return l.key; });
  const wantDist = opts.level >= 5 && Math.random() < 0.25;
  let cands = [];
  function addCands(keyRoles){
    keyRoles.forEach(function(kr){
      ['bid','offer'].forEach(function(side){
        ['improve','worsen'].forEach(function(dir){
          const sizes = legalSizes(opts.board[kr.key], side, dir);
          if (sizes.length) cands.push({ key: kr.key, role: kr.role, side: side, dir: dir, sizes: sizes });
        });
      });
    });
  }
  if (wantDist){
    addCands(opts.boardKeys.filter(function(k){ return legKeys.indexOf(k) < 0; })
      .map(function(k){ return { key:k, role:'dist' }; }));
  }
  if (!cands.length) addCands(legs);
  const weights = cands.map(function(c){ return comboWeight(opts.stats, patKey(st.type, c.role, c.side, c.dir)); });
  const c = weightedPick(cands, weights);
  const shock = { key: c.key, side: c.side, dir: c.dir, size: pick(c.sizes) };
  const post = applyShock(opts.board, shock);
  return {
    targetIdx: opts.targetIdx,
    structure: st,
    shock: shock,
    isDist: c.role === 'dist',
    patternKey: patKey(st.type, c.role, c.side, c.dir),
    pre: opts.board,
    post: post,
    oldImp: deriveImplied(st, opts.board),
    newImp: deriveImplied(st, post)
  };
}

// ---- feedback text ----
function upK(k){ return /^\d+y$/.test(k) ? k.toUpperCase() : k; }
function sideName(s){ return s; } // 'bid' | 'offer'
function shockText(shock, post){
  return xLabel(shock.key) + ' ' + sideName(shock.side) + ' ' +
    (shock.dir === 'improve' ? 'improves' : 'worsens') + ' ' + formatDelta(shock.size) +
    ' → ' + formatPrice(post[shock.key][shock.side]);
}
function formulaCaption(st){
  if (st.type === 'spread') return upK(st.far) + ' − ' + upK(st.near);
  if (st.type === 'fly') return '2×' + upK(st.belly) + ' − ' + upK(st.near) + ' − ' + upK(st.far);
  return xLabel(st.leg1) + ' + ' + xLabel(st.leg2);
}
function derivation(q){
  const st = q.structure, shock = q.shock, post = q.post;
  const F = formatPrice;
  if (q.isDist)
    return xLabel(shock.key) + ' is not a leg of ' + xLabel(st.label) + ' — the implied is unchanged. U was the answer.';
  const movedSide = q.newImp.bid !== q.oldImp.bid ? 'bid' : 'offer';
  const otherSide = movedSide === 'bid' ? 'offer' : 'bid';
  let formula;
  if (st.type === 'spread'){
    const n = post[st.near], f = post[st.far];
    formula = movedSide === 'bid'
      ? upK(st.far)+' bid − '+upK(st.near)+' offer: '+F(f.bid)+' − '+F(n.offer)+' = '+F(q.newImp.bid)
      : upK(st.far)+' offer − '+upK(st.near)+' bid: '+F(f.offer)+' − '+F(n.bid)+' = '+F(q.newImp.offer);
  } else if (st.type === 'fly'){
    const n = post[st.near], b = post[st.belly], f = post[st.far];
    formula = movedSide === 'bid'
      ? '2×'+F(b.bid)+' − '+F(n.offer)+' − '+F(f.offer)+' = '+F(q.newImp.bid)
      : '2×'+F(b.offer)+' − '+F(n.bid)+' − '+F(f.bid)+' = '+F(q.newImp.offer);
  } else {
    const a = post[st.leg1], b = post[st.leg2];
    formula = movedSide === 'bid'
      ? F(a.bid)+' + '+F(b.bid)+' = '+F(q.newImp.bid)
      : F(a.offer)+' + '+F(b.offer)+' = '+F(q.newImp.offer);
  }
  const twice = (st.type === 'fly' && shock.key === st.belly)
    ? ' Belly counts twice — a ' + formatDelta(shock.size) + ' change moves the implied ' + formatDelta(shock.size*2) + '.'
    : '';
  return xLabel(shock.key) + ' ' + shock.side + ' feeds the implied ' + movedSide + ': ' + formula +
    '. ' + otherSide.charAt(0).toUpperCase() + otherSide.slice(1) + ' side untouched.' + twice;
}

// ---- triangle mode: outright + spread, one-sided prices (far = near + spread) ----
// Two one-sided prices imply the third instrument; when a real price then
// prints on that third, it reprices the other two 1:1 — the broker's basic
// pass-through: "a bid in one thing is a bid in everything".
function oppSide(s){ return s === 'bid' ? 'offer' : 'bid'; }
var TRI_RULES = {
  far:    { bid:   { from:[['near','bid'],  ['spread','bid']],   sign: 1 },
            offer: { from:[['near','offer'],['spread','offer']], sign: 1 } },
  near:   { bid:   { from:[['far','bid'],  ['spread','offer']],  sign:-1 },
            offer: { from:[['far','offer'],['spread','bid']],    sign:-1 } },
  spread: { bid:   { from:[['far','bid'],  ['near','offer']],    sign:-1 },
            offer: { from:[['far','offer'],['near','bid']],      sign:-1 } }
};
// prices: partial one-sided map {near:{offer:px}, far:{}, spread:{offer:px}}
function triImplied(inst, side, prices){
  const r = TRI_RULES[inst][side];
  const a = prices[r.from[0][0]][r.from[0][1]];
  const b = prices[r.from[1][0]][r.from[1][1]];
  return r.sign === 1 ? a + b : a - b;
}
function formatDelta(s16){
  const whole = Math.floor(s16/16), rem = s16 % 16;
  const fr = {2:'1/8',4:'1/4',6:'3/8',8:'1/2',10:'5/8',12:'3/4',14:'7/8'}[rem];
  if (!rem) return String(whole);
  return whole ? whole + ' ' + fr : fr;
}
function parseTwoLoose(text){
  const parts = splitAnswer(text);
  if (!parts) return null;
  const p1 = parsePrice(parts[0], null), p2 = parsePrice(parts[1], null);
  return (p1 === null || p2 === null) ? null : [p1, p2];
}
var TRI_DELTAS = [2, 4, 6, 8, 12, 16];             // 1/8 1/4 3/8 1/2 3/4 1 bp
function triNum(k){ return k.replace('y',''); }
function triLabel(scen, inst){
  if (inst === 'near') return upK(scen.nearK);
  if (inst === 'far') return upK(scen.farK);
  return triNum(scen.nearK) + 'x' + triNum(scen.farK);
}
function genTriScenario(){
  const i = ri(0, TENORS.length-2), j = ri(i+1, TENORS.length-1);
  // mix of whole-bp, half-bp and eighth-bp prints
  function grid(){ const r = Math.random(); return r < 0.4 ? 16 : r < 0.7 ? 8 : 2; }
  const g1 = grid(), g2 = grid();
  const nearLvl = Math.round((TENORS[i].mid + Math.random()*2 - 1)*16/g1)*g1;
  let sprLvl = Math.round(((TENORS[j].mid - TENORS[i].mid) + Math.random()*2 - 1)*16/g2)*g2;
  if (sprLvl < 16) sprLvl = 16;
  const levels = { near: nearLvl, far: nearLvl + sprLvl, spread: sprLvl };
  const incomingInst = pick(['far','near','spread']);
  const incomingSide = pick(['bid','offer']);
  const delta = pick(TRI_DELTAS);
  const askSide = oppSide(incomingSide);           // phase A: implied on this side
  const rule = TRI_RULES[incomingInst][askSide];   // its inputs are the two givens
  const prices = { near:{}, far:{}, spread:{} };
  rule.from.forEach(function(f){ prices[f[0]][f[1]] = levels[f[0]]; });
  const impliedA = triImplied(incomingInst, askSide, prices);
  const incomingPx = incomingSide === 'bid' ? impliedA - delta : impliedA + delta;
  const prices2 = { near: Object.assign({}, prices.near),
                    far: Object.assign({}, prices.far),
                    spread: Object.assign({}, prices.spread) };
  prices2[incomingInst][incomingSide] = incomingPx;
  const order = { near:0, far:1, spread:2 };
  const given = rule.from.map(function(f){ return { inst:f[0], side:f[1], px:levels[f[0]] }; })
    .sort(function(x,y){ return order[x.inst] - order[y.inst]; });
  const answers = given.map(function(g){
    const s = oppSide(g.side);                     // the incoming reprices each given's other side
    return { inst:g.inst, side:s, px: triImplied(g.inst, s, prices2) };
  });
  return { nearK: TENORS[i].k, farK: TENORS[j].k, levels: levels, given: given,
           incomingInst: incomingInst, incomingSide: incomingSide,
           incomingPx: incomingPx, delta: delta,
           impliedA: { inst: incomingInst, side: askSide, px: impliedA },
           answers: answers, prices2: prices2 };
}
function triPatternKey(scen){
  return patKey('tri', scen.incomingInst, scen.incomingSide, scen.delta <= 6 ? 'small' : 'large');
}
function triDerivLines(scen){
  const F = formatPrice;
  const lines = scen.answers.map(function(a){
    const r = TRI_RULES[a.inst][a.side];
    const v0 = scen.prices2[r.from[0][0]][r.from[0][1]];
    const v1 = scen.prices2[r.from[1][0]][r.from[1][1]];
    const op = r.sign === 1 ? ' + ' : ' − ';
    return triLabel(scen, a.inst) + ' ' + a.side + ' = ' +
      triLabel(scen, r.from[0][0]) + ' ' + r.from[0][1] + op +
      triLabel(scen, r.from[1][0]) + ' ' + r.from[1][1] + ': ' +
      F(v0) + op + F(v1) + ' = ' + F(a.px);
  });
  lines.push(triLabel(scen, scen.incomingInst) + ' came ' + formatDelta(scen.delta) +
    (scen.incomingSide === 'bid' ? ' under' : ' over') + ' your implied ' + scen.impliedA.side +
    ' — that ' + formatDelta(scen.delta) + ' passes 1:1 into both implieds.');
  return lines;
}

// ---- dealer-board screen: row placement, labels, name flavor ----
function xLabel(k){
  let m = /^(\d+)s(\d+)s(\d+)s$/.exec(k);
  if (m) return m[1] + 'x' + m[2] + 'x' + m[3];
  m = /^(\d+)s(\d+)s$/.exec(k);
  return m ? m[1] + 'x' + m[2] : upK(k);
}
var DEALERS = ['CITI','GS','JPM','MS','BARC','BNPP','DB','UBS','NOM','SOCG','HSBC','RBC','MIZ','SMBC','NWM','TD'];
function dealerFor(label, side, px){          // deterministic: new price = new name
  const str = label + '|' + side + '|' + px;
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (h*31 + str.charCodeAt(i)) >>> 0;
  return DEALERS[h % DEALERS.length];
}
// Pad convention (from the desk pad): every spread lives on BOTH leg pads.
// Offering the spread = bidding the front leg / offering the back leg, so the
// entry flips column on the front pad: a 7x10 offer shows as an X10 bid on the
// 7Y pad and an X7 offer on the 10Y pad. Labels point along the curve.
function padEntries(st){
  if (st.type === 'spread') return [
    { anchor: st.near, tag: 'x' + triNum(st.far), edge: 'r', flip: true },
    { anchor: st.far,  tag: 'x' + triNum(st.near), edge: 'l', flip: false }
  ];
  if (st.type === 'fly') return [
    { anchor: st.belly, tag: triNum(st.near) + '/' + triNum(st.far), edge: 'l', flip: false }
  ];
  const m = /^(\d+)s(\d+)s$/.exec(st.label);
  const tag = m ? m[1] + 'x' + m[2] : st.label;
  return [
    { anchor: st.leg1, tag: tag, edge: 'r', flip: false },
    { anchor: st.leg2, tag: tag, edge: 'l', flip: false }
  ];
}
// An implied carries the names of the quotes it is built from (CITI 2Y offer +
// BNP X3 offer -> implied 3Y offer "CITI,BNP").
function impliedNames(st, board, side){
  if (st.type === 'spread'){
    const f = board[st.far], n = board[st.near];
    return side === 'bid'
      ? dealerFor(xLabel(st.far),'bid',f.bid) + ',' + dealerFor(xLabel(st.near),'offer',n.offer)
      : dealerFor(xLabel(st.far),'offer',f.offer) + ',' + dealerFor(xLabel(st.near),'bid',n.bid);
  }
  if (st.type === 'fly'){
    const n = board[st.near], b = board[st.belly], fw = board[st.far];
    return side === 'bid'
      ? dealerFor(xLabel(st.belly),'bid',b.bid) + ',' + dealerFor(xLabel(st.near),'offer',n.offer) + ',' + dealerFor(xLabel(st.far),'offer',fw.offer)
      : dealerFor(xLabel(st.belly),'offer',b.offer) + ',' + dealerFor(xLabel(st.near),'bid',n.bid) + ',' + dealerFor(xLabel(st.far),'bid',fw.bid);
  }
  const a = board[st.leg1], b2 = board[st.leg2];
  return side === 'bid'
    ? dealerFor(xLabel(st.leg1),'bid',a.bid) + ',' + dealerFor(xLabel(st.leg2),'bid',b2.bid)
    : dealerFor(xLabel(st.leg1),'offer',a.offer) + ',' + dealerFor(xLabel(st.leg2),'offer',b2.offer);
}

// ---- multiple-choice answers: one keypress, traps are the classic mistakes ----
function shuffleArr(a){ for (let i = a.length-1; i > 0; i--){ const j = ri(0,i); const t = a[i]; a[i] = a[j]; a[j] = t; } return a; }
function mktKey(m){ return m.bid + '|' + m.offer; }
// Options for a shift question: correct new implied + 3 traps drawn from
// {unchanged, wrong side, wrong direction, parallel shift, wrong multiple}.
function genShiftChoices(q){
  const old = q.oldImp, neu = q.newImp;
  const mult = (q.structure.type === 'fly' && q.shock.key === q.structure.belly) ? 2 : 1;
  const isUnch = neu.bid === old.bid && neu.offer === old.offer;
  const d = isUnch ? q.shock.size*mult : (neu.bid - old.bid) + (neu.offer - old.offer);
  const u = d/mult, w = (mult === 2 ? 1 : 2)*u;    // the 1x/2x confusion move
  function mk(b,o){ return { bid:b, offer:o }; }
  const correct = mk(neu.bid, neu.offer);
  const seen = {}; seen[mktKey(correct)] = 1;
  let pool = [ mk(old.bid, old.offer),
    mk(old.bid + d, old.offer), mk(old.bid - d, old.offer),
    mk(old.bid, old.offer + d), mk(old.bid, old.offer - d),
    mk(old.bid + d, old.offer + d),
    mk(old.bid + w, old.offer), mk(old.bid, old.offer + w) ];
  pool = pool.filter(function(m){
    if (m.bid >= m.offer || seen[mktKey(m)]) return false;
    seen[mktKey(m)] = 1; return true;
  });
  shuffleArr(pool);
  const traps = pool.slice(0, 3);
  for (let k = 2; traps.length < 3; k++){
    const m = mk(old.bid - k*Math.abs(u), old.offer + k*Math.abs(u));
    if (!seen[mktKey(m)]){ seen[mktKey(m)] = 1; traps.push(m); }
  }
  const options = shuffleArr(traps.concat([correct]));
  return { options: options,
           correctIdx: options.findIndex(function(m){ return mktKey(m) === mktKey(correct); }) };
}
// Triangle options. Phase A: correct implied + {sign-flip of the identity,
// 1/8 off, 1/2 or 1bp off}. Phase B: correct pair + {both legs the wrong
// way, only one leg repriced}.
function genTriChoices(scen){
  const P = scen.impliedA.px;
  const r = TRI_RULES[scen.impliedA.inst][scen.impliedA.side];
  const v0 = scen.levels[r.from[0][0]], v1 = scen.levels[r.from[1][0]];
  const flip = r.sign === 1 ? Math.abs(v0 - v1) : v0 + v1;
  const seenA = {}; seenA[P] = 1;
  const candsA = [flip, P + pick([2,-2]), P + pick([16,-16]), P + pick([8,-8]), P + 4, P - 4, P + 6];
  const trapsA = [];
  candsA.forEach(function(x){ if (trapsA.length < 3 && x > 0 && !seenA[x]){ seenA[x] = 1; trapsA.push(x); } });
  const optionsA = shuffleArr(trapsA.concat([P]));
  const a0 = scen.answers[0], a1 = scen.answers[1];
  const l0 = scen.levels[a0.inst], l1 = scen.levels[a1.inst];
  const C = [a0.px, a1.px];
  const optionsB = shuffleArr([ [2*l0 - a0.px, 2*l1 - a1.px], [a0.px, l1], [l0, a1.px], C ]);
  return {
    A: { options: optionsA, correctIdx: optionsA.indexOf(P) },
    B: { options: optionsB, correctIdx: optionsB.findIndex(function(p){ return p[0] === C[0] && p[1] === C[1]; }) }
  };
}

// Step-1 choices: call the shift in words before quoting full markets.
function dirLabel(side, d16){
  if (!side || !d16) return 'unchanged';
  return side + (d16 > 0 ? ' +' : ' −') + formatDelta(Math.abs(d16));
}
function genDirChoices(q){
  const old = q.oldImp, neu = q.newImp;
  const isUnch = neu.bid === old.bid && neu.offer === old.offer;
  const mult = (q.structure.type === 'fly' && q.shock.key === q.structure.belly) ? 2 : 1;
  const d = isUnch ? q.shock.size*mult : (neu.bid - old.bid) + (neu.offer - old.offer);
  const m = isUnch ? null : (neu.bid !== old.bid ? 'bid' : 'offer');
  const w = (mult === 2 ? 1 : 2) * (d/mult);
  const correct = { side: m, d: isUnch ? 0 : d };
  const key = (o) => (o.side || 'u') + '|' + o.d;
  const seen = {}; seen[key(correct)] = 1;
  let pool = [ { side:null, d:0 },
    { side:'bid', d:d }, { side:'bid', d:-d },
    { side:'offer', d:d }, { side:'offer', d:-d },
    { side: m || 'bid', d: w }, { side: m || 'offer', d: -w } ];
  pool = pool.filter(function(o){
    if (!o.d && o.side) return false;
    const k2 = key(o); if (seen[k2]) return false; seen[k2] = 1; return true;
  });
  shuffleArr(pool);
  const options = shuffleArr(pool.slice(0, 3).concat([correct]));
  return { options: options,
           correctIdx: options.findIndex(function(o){ return key(o) === key(correct); }) };
}

// ==PURE-END==

  eq('parse halves', parseAnswer('51 1/2 / 50 5/8', 'ob', prev), {kind:'market', offer:824, bid:810});

  eq('fraction shorthand 5/8 w/ prev', parsePrice('5/8', 808), 810);
  eq('spaced slash keeps small ints', splitAnswer('9 / 4'), ['9','4']);
  eq('fraction pair shorthand', parseAnswer('5/8 / 1/2', 'bo', {bid:808, offer:824}), {kind:'market', bid:810, offer:824});
  eq('parse bid/offer order', parseAnswer('50 5/8 / 51 4/8', 'bo', prev), {kind:'market', bid:810, offer:824});

  eq('parse whole bp', parsePrice('51', null), 816);

  eq('shorthand negative', parsePrice('3', -568), -566);        // near -35 4/8 → -35 3/8

  // shock text (broker language)
  eq('shock text', shockText(shock, B2), '5Y offer improves 1/8 → 45 5/8');
  // legal sizes never cross the market
  eq('legalSizes tight market', legalSizes({bid:724,offer:728}, 'offer', 'improve'), [2]);

  // TRIANGLE — user's worked example: 1Y offer 110 + 1x2 offer 5 → implied 2Y
  // offer 115; a 114 bid prints in 2Y → 1Y bid 109, 1x2 bid 4 (Δ1 passes 1:1)
  eq('tri build: far offer', triImplied('far','offer',{near:{offer:1760},far:{},spread:{offer:80}}), 1840);
  const TPB = { near:{offer:1760}, far:{bid:1824}, spread:{offer:80} };
  eq('tri cascade: near bid 109', triImplied('near','bid',TPB), 1744);
  eq('tri cascade: spread bid 4', triImplied('spread','bid',TPB), 64);
  // eighths: 5Y offer 46 2/8 + 5x10 offer 25 2/8 → 10Y offer 71 4/8;

  eq('tri build eighths', triImplied('far','offer',{near:{offer:740},far:{},spread:{offer:404}}), 1144);
  const TPC = { near:{offer:740}, far:{bid:1142}, spread:{offer:404} };
  eq('tri eighths: near bid', triImplied('near','bid',TPC), 738);
  eq('tri eighths: spread bid', triImplied('spread','bid',TPC), 402);
  // mixed sides: incoming near bid against given far offer & spread bid
  const TPD = { near:{bid:1744}, far:{offer:1840}, spread:{bid:80} };
  eq('tri mixed: far bid', triImplied('far','bid',TPD), 1824);
  eq('tri mixed: spread offer', triImplied('spread','offer',TPD), 96);
  eq('delta 1/8', formatDelta(2), '1/8');

  eq('parseTwoLoose fractions', parseTwoLoose('109 4/8 / 4 4/8'), [1752, 72]);
  eq('parseTwoLoose whole bp', parseTwoLoose('109/4'), [1744, 64]);
  eq('parseTwoLoose decimals', parseTwoLoose('109.5/4.5'), [1752, 72]);
  // generator invariant: every phase-B answer sits exactly Δ off its level,
  // toward the incoming price — bids Δ under, offers Δ over
  let triBad = 0;
  for (let t = 0; t < 200; t++){
    const sc = genTriScenario();
    if (sc.answers.length !== 2) triBad++;
    if (triImplied(sc.impliedA.inst, sc.impliedA.side, sc.prices2) !== sc.impliedA.px) triBad++;
    sc.answers.forEach(function(a){
      if (a.px !== sc.levels[a.inst] + (a.side === 'offer' ? sc.delta : -sc.delta)) triBad++;
      if (a.px <= 0 || a.px % 2 !== 0) triBad++;
    });
  }
  eq('tri scenarios ×200: 1:1 pass-through holds', triBad, 0);

  // MULTIPLE CHOICE — correct always present, 4 unique uncrossed options
  let mcBad = 0;
  for (let t = 0; t < 200; t++){
    const lv = pick([2,3,4,5]);

    if (c.options.length !== 4) mcBad++;
    if (mktKey(c.options[c.correctIdx]) !== mktKey(q.newImp)) mcBad++;

    c.options.forEach(function(m){ if (sn[mktKey(m)] || m.bid >= m.offer) mcBad++; sn[mktKey(m)] = 1; });

  eq('shift choices ×200 valid', mcBad, 0);
  let tcBad = 0;
  for (let t = 0; t < 200; t++){

    if (tc.A.options.length !== 4 || tc.A.options[tc.A.correctIdx] !== sc.impliedA.px) tcBad++;
    if (new Set(tc.A.options).size !== 4) tcBad++;
    if (tc.B.options.length !== 4) tcBad++;

    if (cb[0] !== sc.answers[0].px || cb[1] !== sc.answers[1].px) tcBad++;
    const sb = new Set(tc.B.options.map(function(p){ return p.join('|'); }));
    if (sb.size !== 4) tcBad++;
  }
  eq('tri choices ×200 valid', tcBad, 0);

  // STEP-1 direction choices
  eq('dirLabel up', dirLabel('bid', 2), 'bid +1/8');
  eq('dirLabel down', dirLabel('offer', -4), 'offer −1/4');
  eq('dirLabel unchanged', dirLabel(null, 0), 'unchanged');
  let dcBad = 0;
  for (let t = 0; t < 200; t++){

    const isUnch = q.newImp.bid === q.oldImp.bid && q.newImp.offer === q.oldImp.offer;
    const co = c.options[c.correctIdx];
    if (isUnch ? (co.side !== null) : (co.side === null)) dcBad++;
    if (!isUnch && co.d !== (q.newImp.bid - q.oldImp.bid) + (q.newImp.offer - q.oldImp.offer)) dcBad++;
    const sn = {};
    c.options.forEach(function(o){ const k2 = (o.side||'u')+'|'+o.d; if (sn[k2]) dcBad++; sn[k2] = 1; });

  // DEALER-PAD SCREEN metadata
  eq('xLabel spread market', xLabel('2s5s'), '2x5');

    {anchor:'10y', tag:'x5', edge:'l', flip:false}]);
  eq('pad: fly on belly', padEntries(mkFly('2y','5y','10y')),
    [{anchor:'5y', tag:'2/10', edge:'l', flip:false}]);
  eq('pad: chain on both legs, no flip', padEntries({type:'chain', leg1:'2s5s', leg2:'5s10s', label:'2s10s'}), [
    {anchor:'2s5s', tag:'2x10', edge:'r', flip:false},
    {anchor:'5s10s', tag:'2x10', edge:'l', flip:false}]);
  eq('dealer name deterministic', dealerFor('10Y','bid',1540), dealerFor('10Y','bid',1540));
  eq('implied bid names = far bid + near offer dealers', impliedNames(SP, B, 'bid'),
     dealerFor('10Y','bid',1540) + ',' + dealerFor('5Y','offer',732));
  eq('implied offer names = far offer + near bid dealers', impliedNames(SP, B, 'offer'),
     dealerFor('10Y','offer',1548) + ',' + dealerFor('5Y','bid',724));
  eq('fly implied names carry three dealers', impliedNames(FLY, B, 'bid').split(',').length, 3);
  return { count: count, failed: failed };
}

// diverging accuracy scale (neutral band ~70–80%); every cell also shows text.
function heatColor(acc){
  if (acc < 0.35) return { bg:'var(--heat-w3)', ink:'#0b0e17' };
  if (acc < 0.55) return { bg:'var(--heat-w2)', ink:'#f5f7ff' };
  if (acc < 0.70) return { bg:'var(--heat-w1)', ink:'#f5f7ff' };

function Px({ s16, implied }){

function Mkt({ mkt, conv, flashSide, dir, qid, cls, implied }){

function ScreenHead({ conv }){

// cols: { offer: cell, bid: cell } where cell = { px, name, flash, dir, was }
function ScreenRow({ labL, labR, kind, target, conv, qid, cols, mid, extra }){
  const order = conv === 'ob' ? ['offer','bid'] : ['bid','offer'];
  const c0 = cols[order[0]] || {}, c1 = cols[order[1]] || {};
  const px = (c) => c.px != null ? <Px s16={c.px} implied={c.imp} /> : '—';
  const nm = (c) => c.was != null ? <s>{formatPrice(c.was)}</s> : (c.name || '');
  const f = (c) => c.flash ? (c.dir === 'improve' ? ' chg flash-up' : ' chg flash-down') : '';
  const dim = (c) => c.px == null ? ' dim' : '';
  return (
    <div className={'srow ' + kind + (target ? ' target' : '') + (extra ? ' ' + extra : '')}>
      <span className={'slab ' + kind}>{labL}{target && labR ? <span className="tgt">TGT</span> : null}</span>
      <span className="sname l">{nm(c0)}</span>

// The desk pad: one T-cross per instrument. Outright on top, structures below
// the rule — a spread lives on BOTH leg pads and flips column on the front pad
// (offering 7x10 = bidding the 7Y leg / offering the 10Y leg). Implied rows
// carry the names of the quotes they are built from.
function ScreenBoard({ round, q, conv }){
  const byAnchor = {};
  round.structures.forEach((st, i) => {
    const imp = i === q.targetIdx ? q.oldImp : deriveImplied(st, q.pre);
    padEntries(st).forEach(en => {
      (byAnchor[en.anchor] = byAnchor[en.anchor] || []).push(
        Object.assign({ st: st, i: i, imp: imp }, en));
    });
  });
  const ocell = (k, side) => {
    const changed = q.shock.key === k && q.shock.side === side;
    const pxv = (q.shock.key === k ? q.post : q.pre)[k][side];
    return { px: pxv, name: dealerFor(xLabel(k), side, pxv),
             flash: changed, dir: q.shock.dir, was: changed ? q.pre[k][side] : null };
  };
  const scell = (en, structSide) => (
    { px: en.imp[structSide], name: impliedNames(en.st, q.pre, structSide), imp: true });
  const isMkt = round.boardKind === 'SPREAD MARKETS';
  const legKeys = structLegs(q.structure).map(function(l){ return l.key; });
  const rowFocus = (k) => q.shock.key === k ? 'shocked' : (legKeys.indexOf(k) < 0 ? 'dimmed' : '');
  return (
    <div className="screen">
      <ScreenHead conv={conv} />
      {round.boardKeys.map(k => {
        const ens = byAnchor[k] || [];
        return (
          <div className="pad" key={k}>
            {isMkt
              ? <ScreenRow labL={xLabel(k)} labR="" kind="mktrow" conv={conv} qid={q.id} extra={rowFocus(k)}
                           cols={{ offer: ocell(k, 'offer'), bid: ocell(k, 'bid') }} />
              : <ScreenRow labL="" labR="" mid={xLabel(k)} kind="bar" conv={conv} qid={q.id} extra={rowFocus(k)}
                           cols={{ offer: ocell(k, 'offer'), bid: ocell(k, 'bid') }} />}
            {ens.map(en => (
              <ScreenRow key={en.st.label + en.tag}
                         labL={en.edge === 'l' ? en.tag : ''} labR={en.edge === 'r' ? en.tag : ''}
                         kind={en.st.type} target={en.i === q.targetIdx} conv={conv} qid={q.id}
                         extra={en.i === q.targetIdx ? '' : 'dimmed'}
                         cols={en.flip
                           ? { offer: scell(en, 'bid'), bid: scell(en, 'offer') }
                           : { offer: scell(en, 'offer'), bid: scell(en, 'bid') }} />
            ))}
          </div>
        );
      })}
      <div className="hint" style={{marginTop:'.4rem'}}>
        {xLabel(q.structure.label)} = {formulaCaption(q.structure)} · ' = implied · gold row changed, cyan rows are your target
      </div>
    </div>
  );
}

// Triangle: near + far pads, one-sided quotes; the spread quote sits on both
// pads (flipped on the near pad), the incoming price flashes where it lands.
function TriScreen({ scen, stage, conv }){
  const pmap = { near: {}, far: {}, spread: {} };
  const who = { near: {}, far: {}, spread: {} };
  scen.given.forEach(g => { pmap[g.inst][g.side] = g.px; who[g.inst][g.side] = 'given'; });
  if (stage !== 'A'){
    pmap[scen.incomingInst][scen.incomingSide] = scen.incomingPx;
    who[scen.incomingInst][scen.incomingSide] = 'incoming';
  }
  const spLabel = triLabel(scen, 'spread');
  const cell = (inst, side, dispLabel) => {
    const pxv = pmap[inst][side];
    if (pxv == null) return {};
    return { px: pxv, name: dealerFor(dispLabel, side, pxv),
             flash: who[inst][side] === 'incoming',
             dir: scen.incomingSide === 'bid' ? 'improve' : 'worsen' };
  };
  return (
    <div className="screen">
      <ScreenHead conv={conv} />
      <div className="pad">
        <ScreenRow labL="" labR="" mid={upK(scen.nearK)} kind="bar" conv={conv} qid={scen.id}
                   cols={{ offer: cell('near','offer',upK(scen.nearK)), bid: cell('near','bid',upK(scen.nearK)) }} />
        <ScreenRow labL="" labR={'x' + triNum(scen.farK)} kind="spread" conv={conv} qid={scen.id}
                   cols={{ offer: cell('spread','bid',spLabel), bid: cell('spread','offer',spLabel) }} />
      </div>
      <div className="pad">
        <ScreenRow labL="" labR="" mid={upK(scen.farK)} kind="bar" conv={conv} qid={scen.id}
                   cols={{ offer: cell('far','offer',upK(scen.farK)), bid: cell('far','bid',upK(scen.farK)) }} />
        <ScreenRow labL={'x' + triNum(scen.nearK)} labR="" kind="spread" conv={conv} qid={scen.id}
                   cols={{ offer: cell('spread','offer',spLabel), bid: cell('spread','bid',spLabel) }} />
      </div>
      <div className="hint" style={{marginTop:'.4rem'}}>
        the {spLabel} spread sits on both pads — flipped on the {upK(scen.nearK)} pad (a spread offer bids the front leg) · one-sided prices
      </div>
    </div>
  );
}

function Drill({ level, speed, conv, inputMode, blind, statsRef, onEnd }){
  const [round] = useState(() => genRound(level));
  const historyRef = useRef([]);
  const makeQ = useCallback((board, id) => {
    const targetIdx = level >= 5 ? ri(0, round.structures.length-1) : 0;
    const q = genQuestion({ level, board, boardKeys: round.boardKeys,
      structures: round.structures, targetIdx, stats: statsRef.current });
    q.id = id;
    q.text = shockText(q.shock, q.post);
    q.choices = genShiftChoices(q);
    q.dirChoices = genDirChoices(q);
    return q;
  }, [level, round, statsRef]);
  const [q, setQ] = useState(() => makeQ(round.board, 1));
  const [phase, setPhase] = useState('answer');           // 'answer' | 'feedback'
  // progression: call the shift in words first; 4 straight promotes to full quotes
  const [stage, setStage] = useState(inputMode === 'keys' ? 'dir' : 'quote');
  const dirRunRef = useRef(0);
  const [briefed, setBriefed] = useState(!blind);         // blind mode: read the calls once
  const [input, setInput] = useState('');
  const [err, setErr] = useState(null);
  const [fb, setFb] = useState(null);
  const [remaining, setRemaining] = useState(SPEED_MS);
  const t0 = useRef(0);
  const inputRef = useRef(null);
  window.__q = q; window.__fmt = formatPrice; window.__stage = stage;   // debug/e2e hooks

  useEffect(() => {                                       // question start
    t0.current = performance.now();
    setRemaining(SPEED_MS);
    if (inputRef.current) inputRef.current.focus();
  }, [q.id, briefed]);

  const submit = useCallback((ans) => {                   // ans: parsed | 'timeout'
    const ms = Math.round(performance.now() - t0.current);
    const unchanged = q.oldImp.bid === q.newImp.bid && q.oldImp.offer === q.newImp.offer;
    let ok = false, swap = false;
    if (ans !== 'timeout' && ans){
      if (ans.kind === 'dir') ok = ans.idx === q.dirChoices.correctIdx;
      else if (ans.kind === 'unchanged') ok = unchanged;
      else {
        ok = ans.bid === q.newImp.bid && ans.offer === q.newImp.offer;
        swap = !ok && ans.bid === q.newImp.offer && ans.offer === q.newImp.bid;
      }
    }
    let promoted = false;
    if (stage === 'dir'){
      dirRunRef.current = ok ? dirRunRef.current + 1 : 0;
      if (dirRunRef.current >= 4) promoted = true;
    }
    recordResult(statsRef.current, q.patternKey, ok, ms);
    historyRef.current.push({ key: q.patternKey, ok, ms });
    setFb({ ok, ms, swap, timeout: ans === 'timeout', promoted });
    setPhase('feedback');
  }, [q, statsRef, stage]);

  const next = useCallback(() => {
    if (q.id >= QUESTIONS_PER_ROUND){ onEnd(historyRef.current); return; }
    setInput(''); setErr(null);
    if (fb && fb.promoted) setStage('quote');
    setFb(null);
    setQ(makeQ(q.post, q.id + 1));                        // board evolves
    setPhase('answer');
  }, [q, fb, makeQ, onEnd]);

  useEffect(() => {                                       // speed-mode countdown
    if (!speed || phase !== 'answer' || !briefed) return;
    const iv = setInterval(() => {
      const left = SPEED_MS - (performance.now() - t0.current);
      setRemaining(left);
      if (left <= 0) submit('timeout');
    }, 100);
    return () => clearInterval(iv);
  }, [speed, phase, q.id, submit, briefed]);

  useEffect(() => {                                       // keys: N next, U unchanged, Esc end
    const h = (e) => {
      if (e.key === 'Escape'){ e.preventDefault(); onEnd(historyRef.current); return; }
      if (!briefed){
        if (e.key === 'n' || e.key === 'N' || e.key === 'Enter'){ e.preventDefault(); setBriefed(true); }
        return;
      }
      if (phase === 'feedback' && (e.key === 'n' || e.key === 'N' || e.key === 'Enter')){
        e.preventDefault(); next(); return;
      }
      if (phase === 'answer' && (e.key === 'u' || e.key === 'U') &&
          (!inputRef.current || inputRef.current.value.trim() === '')){
        e.preventDefault(); submit({ kind:'unchanged' });
      }
      if (phase === 'answer' && inputMode === 'keys' && e.key >= '1' && e.key <= '4'){
        const i = +e.key - 1;
        if (stage === 'dir'){
          if (q.dirChoices.options[i]){ e.preventDefault(); submit({ kind:'dir', idx: i }); }
        } else {
          const m = q.choices.options[i];
          if (m){ e.preventDefault(); submit({ kind:'market', bid: m.bid, offer: m.offer }); }
        }
      }
    };
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, [phase, next, submit, onEnd, inputMode, q, stage, briefed]);

  const onSubmit = (e) => {
    e.preventDefault();
    const ans = parseAnswer(input, conv, q.oldImp);
    if (!ans){ setErr('could not read that — e.g. "51 1/2 / 50 5/8", "51.5/50.625" or fractions "5/8 / 1/2"'); return; }
    submit(ans);
  };

  const streak = (() => { let s = 0; const h = historyRef.current;
    for (let i = h.length-1; i >= 0 && h[i].ok; i--) s++; return s; })();
  const first = conv === 'ob' ? 'offer' : 'bid';
  const second = conv === 'ob' ? 'bid' : 'offer';
  const handles = Math.floor(Math.abs(q.oldImp[first])/16) + ' / ' + Math.floor(Math.abs(q.oldImp[second])/16);
  const unchanged = q.oldImp.bid === q.newImp.bid && q.oldImp.offer === q.newImp.offer;

  return (
    <div>
      <div className="hud">
        <span>LVL <b>{level}</b></span>
        <span>Q <b>{q.id}/{QUESTIONS_PER_ROUND}</b></span>
        <span>STREAK <b>{streak}</b></span>
        <span>TARGET <b>{xLabel(q.structure.label)}</b></span>
        {inputMode === 'keys' && <span>STEP <b>{stage === 'dir' ? '1 · call it' : '2 · quote it'}</b></span>}
        <span style={{marginLeft:'auto'}}>
          <button type="button" className="btn end" onClick={() => onEnd(historyRef.current)}>END ✕</button>
        </span>
      </div>
      {!blind && <ScreenBoard round={round} q={q} conv={conv} />}
      {blind && !briefed && (
        <div className="panel">
          <div className="panel-title">OPENING CALLS · read once — then the board is in your head</div>
          {round.boardKeys.map(k => {
            const m = round.board[k];
            const s0 = conv === 'ob' ? 'offer' : 'bid', s1 = conv === 'ob' ? 'bid' : 'offer';
            return (
              <div key={k} className="fb-deriv" style={{fontFamily:'var(--mono)'}}>
                <b style={{color:'var(--gold)'}}>{xLabel(k)}</b>{' — '}
                {formatPrice(m[s0])} {s0} ({dealerFor(xLabel(k), s0, m[s0])}) / {formatPrice(m[s1])} {s1} ({dealerFor(xLabel(k), s1, m[s1])})
              </div>
            );
          })}
          <div className="fb-deriv" style={{fontFamily:'var(--mono)'}}>
            structures in play: {round.structures.map(st => xLabel(st.label)).join(' · ')}
          </div>
          <div className="btnrow">
            <button type="button" className="btn primary" onClick={() => setBriefed(true)}>MEMORISED ▸&nbsp;&nbsp;N</button>
          </div>
        </div>
      )}
      {blind && briefed && (
        <div className="hint" style={{marginBottom:'.6rem'}}>board hidden — every change is announced, you keep the prices</div>
      )}
      {briefed && <React.Fragment>
      <div className="shock">
        <span className="shock-label">CHANGE</span>
        <span className="shock-text">{q.text}</span>
        {speed && phase === 'answer' && <span className="clock">{Math.max(0, remaining/1000).toFixed(1)}s</span>}
      </div>
      <div className="task">
        <span className="task-label">{stage === 'dir' ? 'CALL IT' : 'QUOTE IT'}</span>
        <span className="task-text">
          {stage === 'dir' ? 'what does that do to the ' : 're-quote the '}
          <b>{xLabel(q.structure.label)}</b> implied
          {!blind && <span className="task-was">was <Mkt mkt={q.oldImp} conv={conv} cls="mkt-sm" implied /></span>}
        </span>
      </div>
      {phase === 'answer' && inputMode === 'keys' && stage === 'dir' ? (
        <div className="choices">
          <div className="anshdr">YOUR ANSWER · press 1–4 or tap</div>
          {q.dirChoices.options.map((o, i) => (
            <div key={q.id + '-d' + i} className="choice" onClick={() => submit({ kind:'dir', idx: i })}>
              <span className="cnum">{i + 1}</span>
              <span className="mkt">{dirLabel(o.side, o.d)}</span>
            </div>
          ))}
          <div className="hint">4 straight correct calls unlock full quoting</div>
        </div>
      ) : phase === 'answer' && inputMode === 'keys' ? (
        <div className="choices">
          <div className="anshdr">YOUR ANSWER · press 1–4 or tap · {conv === 'ob' ? 'offer / bid' : 'bid / offer'}</div>
          {q.choices.options.map((m, i) => (
            <div key={q.id + '-' + i} className="choice"
                 onClick={() => submit({ kind:'market', bid: m.bid, offer: m.offer })}>
              <span className="cnum">{i + 1}</span>
              <Mkt mkt={m} conv={conv} cls="mkt" />
              {m.bid === q.oldImp.bid && m.offer === q.oldImp.offer && <span className="was">unchanged</span>}
            </div>
          ))}

        </div>
      ) : phase === 'answer' ? (
        <form className="ansform" onSubmit={onSubmit}>
          <input ref={inputRef} value={input} autoFocus autoComplete="off" spellCheck="false"
                 onChange={e => { setInput(e.target.value); setErr(null); }}
                 placeholder={'new implied ' + (conv === 'ob' ? 'offer / bid' : 'bid / offer')} />
          <div className="hint">handles {handles} · type "{conv === 'ob' ? 'offer / bid' : 'bid / offer'}" · fractions only is fine ("5/8 / 1/2")</div>
          {err && <div className="err">{err}</div>}
          <div className="btnrow">
            <button type="submit" className="btn">SUBMIT ⏎</button>
            <button type="button" className="btn" onClick={() => submit({ kind:'unchanged' })}>UNCHANGED · U</button>
          </div>
        </form>
      ) : (
        <div className={'fb ' + (fb.ok ? 'ok' : 'bad')}>
          <div className="fb-line1">
            <span className="verdict">{fb.ok ? 'CORRECT' : (fb.timeout ? 'TIME OUT' : 'WRONG')}</span>
            <span className="ms">{(fb.ms/1000).toFixed(2)}s</span>
            <span className="stk">streak {streak}</span>
          </div>
          <div className="fb-ans">
            {unchanged ? 'UNCHANGED — ' : ''}
            <Mkt mkt={q.newImp} conv={conv} cls="mkt" implied />
          </div>
          {fb.swap && <div className="fb-swap">right numbers, wrong order — quotes here are {conv === 'ob' ? 'OFFER / BID' : 'BID / OFFER'}</div>}
          {fb.promoted && <div className="fb-swap">STEP UP — from the next question you quote the full market</div>}
          <div className="fb-deriv">{derivation(q)}</div>
          <div className="btnrow">
            <button type="button" className="btn primary" onClick={next}>NEXT ▸&nbsp;&nbsp;N</button>
          </div>
        </div>
      )}
      </React.Fragment>}
    </div>
  );
}

function TriangleDrill({ speed, conv, inputMode, blind, statsRef, onEnd }){
  const historyRef = useRef([]);
  const [scen, setScen] = useState(() => { const s = genTriScenario(); s.id = 1; s.choices = genTriChoices(s); return s; });
  const [stage, setStage] = useState('A');                // 'A' build | 'B' cascade | 'feedback'
  const [input, setInput] = useState('');
  const [err, setErr] = useState(null);
  const [resA, setResA] = useState(null);
  const [fb, setFb] = useState(null);
  const [remaining, setRemaining] = useState(SPEED_MS);
  const tStage = useRef(0), tAll = useRef(0);
  const inputRef = useRef(null);
  window.__tri = scen; window.__fmt = formatPrice;        // debug/e2e hooks

  useEffect(() => {
    tStage.current = performance.now();
    if (stage === 'A') tAll.current = tStage.current;
    setRemaining(SPEED_MS);
    if (inputRef.current) inputRef.current.focus();
  }, [scen.id, stage]);

  const conclude = (okB, timeout) => {
    const ms = Math.round(performance.now() - tAll.current);
    const ok = !!(resA && resA.ok) && okB;
    recordResult(statsRef.current, triPatternKey(scen), ok, ms);
    historyRef.current.push({ key: triPatternKey(scen), ok, ms });
    setFb({ ok, okB, ms, timeout });
    setStage('feedback');
  };
  const submit = (e) => {
    e.preventDefault();
    if (stage === 'A'){
      const v = parsePrice(input.trim(), null);
      if (v === null){ setErr('one price — "115", "115 1/2" or "114.875"'); return; }
      setResA({ ok: v === scen.impliedA.px, val: v });
      setInput(''); setErr(null); setStage('B');
    } else {
      const v = parseTwoLoose(input);
      if (!v){ setErr('two prices, "/"-separated — e.g. "109 1/2 / 4 1/2" (bare numbers are whole bp)'); return; }
      conclude(v[0] === scen.answers[0].px && v[1] === scen.answers[1].px, false);
    }
  };
  const chooseA = (i) => {
    const v = scen.choices.A.options[i];
    if (v == null) return;
    setResA({ ok: i === scen.choices.A.correctIdx, val: v });
    setInput(''); setErr(null); setStage('B');
  };
  const chooseB = (i) => {
    if (!scen.choices.B.options[i]) return;
    conclude(i === scen.choices.B.correctIdx, false);
  };
  const next = () => {
    if (scen.id >= QUESTIONS_PER_ROUND){ onEnd(historyRef.current); return; }
    const s = genTriScenario(); s.id = scen.id + 1; s.choices = genTriChoices(s);
    setScen(s); setResA(null); setFb(null); setInput(''); setErr(null); setStage('A');
  };

  useEffect(() => {                                       // speed-mode countdown per stage
    if (!speed || stage === 'feedback') return;
    const iv = setInterval(() => {
      const left = SPEED_MS - (performance.now() - tStage.current);
      setRemaining(left);
      if (left <= 0){
        if (stage === 'A'){ setResA({ ok:false, timeout:true }); setInput(''); setStage('B'); }
        else conclude(false, true);
      }
    }, 100);
    return () => clearInterval(iv);
  }, [speed, stage, scen.id]);

  useEffect(() => {
    const h = (e) => {
      if (e.key === 'Escape'){ e.preventDefault(); onEnd(historyRef.current); return; }
      if (stage === 'feedback' && (e.key === 'n' || e.key === 'N' || e.key === 'Enter')){
        e.preventDefault(); next();
      }
      if (inputMode === 'keys' && stage !== 'feedback' && e.key >= '1' && e.key <= '4'){
        e.preventDefault();
        if (stage === 'A') chooseA(+e.key - 1); else chooseB(+e.key - 1);
      }
    };
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, [stage, scen.id, inputMode, resA]);

  const L = (inst) => triLabel(scen, inst);
  const streak = (() => { let s = 0; const h = historyRef.current;
    for (let i = h.length-1; i >= 0 && h[i].ok; i--) s++; return s; })();
  const a0 = scen.answers[0], a1 = scen.answers[1];

  return (
    <div>
      <div className="hud">
        <span>LVL <b>1</b></span>
        <span>Q <b>{scen.id}/{QUESTIONS_PER_ROUND}</b></span>
        <span>STREAK <b>{streak}</b></span>
        <span>TRIANGLE <b>{L('near')} · {L('far')} · {L('spread')}</b></span>
        <span style={{marginLeft:'auto'}}>
          <button type="button" className="btn end" onClick={() => onEnd(historyRef.current)}>END ✕</button>
        </span>
      </div>
      {(!blind || stage === 'A') ? <TriScreen scen={scen} stage={stage} conv={conv} />
        : <div className="hint" style={{marginBottom:'.6rem'}}>screen hidden — the given prices are in your head now</div>}
      {resA && (
        <div className="panel" style={{padding:'.45rem .9rem'}}>
          <span className="hint">
            your implied {L(scen.impliedA.inst)} {scen.impliedA.side}: {blind && stage !== 'feedback' ? '· · ·' : <span>{formatPrice(scen.impliedA.px)}&#8217;</span>}{' '}
            {resA.ok ? '✓' : resA.timeout ? '— time ran out' : (blind && stage !== 'feedback') ? '✗' : '✗ (you had ' + formatPrice(resA.val) + ')'}
          </span>
        </div>
      )}
      <div className="shock">
        <span className="shock-label">{stage === 'A' ? 'BUILD' : 'CHANGE'}</span>
        <span className="shock-text">
          {stage === 'A'
            ? 'quote the implied ' + L(scen.impliedA.inst) + ' ' + scen.impliedA.side
            : L(scen.incomingInst) + ' ' + scen.incomingSide + ' comes ' + formatPrice(scen.incomingPx) + ' — re-quote the other two'}
        </span>
        {speed && stage !== 'feedback' && <span className="clock">{Math.max(0, remaining/1000).toFixed(1)}s</span>}
      </div>
      {stage !== 'feedback' && inputMode === 'keys' ? (
        <div className="choices">
          <div className="anshdr">YOUR ANSWER · press 1–4 or tap</div>
          {stage === 'A'
            ? scen.choices.A.options.map((v, i) => (
                <div key={scen.id + 'A' + i} className="choice" onClick={() => chooseA(i)}>
                  <span className="cnum">{i + 1}</span>
                  <span className="mkt"><Px s16={v} /></span>
                </div>
              ))
            : scen.choices.B.options.map((p, i) => (
                <div key={scen.id + 'B' + i} className="choice" onClick={() => chooseB(i)}>
                  <span className="cnum">{i + 1}</span>
                  <span className="mkt">
                    {L(a0.inst)} {a0.side} <Px s16={p[0]} />
                    <span className="slash"> · </span>
                    {L(a1.inst)} {a1.side} <Px s16={p[1]} />
                  </span>
                </div>
              ))}

        </div>
      ) : stage !== 'feedback' ? (
        <form className="ansform" onSubmit={submit}>
          <input ref={inputRef} value={input} autoFocus autoComplete="off" spellCheck="false"
                 onChange={e => { setInput(e.target.value); setErr(null); }}
                 placeholder={stage === 'A'
                   ? 'implied ' + L(scen.impliedA.inst) + ' ' + scen.impliedA.side
                   : L(a0.inst) + ' ' + a0.side + ' / ' + L(a1.inst) + ' ' + a1.side} />
          <div className="hint">{stage === 'A'
            ? 'one price · "115", "115 1/2", "114.875"'
            : 'two prices in that order, "/"-separated · bare numbers are whole bp'}</div>
          {err && <div className="err">{err}</div>}
          <div className="btnrow"><button type="submit" className="btn">SUBMIT ⏎</button></div>
        </form>
      ) : (
        <div className={'fb ' + (fb.ok ? 'ok' : 'bad')}>
          <div className="fb-line1">
            <span className="verdict">{fb.ok ? 'CORRECT' : fb.timeout ? 'TIME OUT' : 'WRONG'}</span>
            <span className="ms">{(fb.ms/1000).toFixed(2)}s total</span>
            <span className="stk">streak {streak}</span>
          </div>
          <div className="fb-ans">
            {L(a0.inst)} {a0.side} <Px s16={a0.px} implied />
            <span className="slash"> · </span>
            {L(a1.inst)} {a1.side} <Px s16={a1.px} implied />
          </div>
          {triDerivLines(scen).map((ln, i) => <div key={i} className="fb-deriv">{ln}</div>)}
          <div className="btnrow">
            <button type="button" className="btn primary" onClick={next}>NEXT ▸&nbsp;&nbsp;N</button>
          </div>
        </div>
      )}
    </div>
  );
}

const TRI_ROWS = [
  { role:'far',    label:'triangle · price in the far leg' },
  { role:'near',   label:'triangle · price in the near leg' },
  { role:'spread', label:'triangle · price in the spread' },
];
const TRI_COLS = [
  { side:'bid',   d:'small', label:'BID · Δ≤3/8' },
  { side:'bid',   d:'large', label:'BID · Δ≥1/2' },
  { side:'offer', d:'small', label:'OFFER · Δ≤3/8' },
  { side:'offer', d:'large', label:'OFFER · Δ≥1/2' },
];

function HeatCell({ s, title }){
  if (!s || !s.n) return <td className="cell empty">—</td>;
  const acc = s.ok/s.n, col = heatColor(acc), med = median(s.times);
  return (
    <td className="cell" style={{ background: col.bg, color: col.ink }}
        title={title + ': ' + s.ok + '/' + s.n + ' correct, median ' + (med/1000).toFixed(1) + 's'}>
      <div className="a">{Math.round(acc*100)}%</div>
      <div className="m">{s.ok}/{s.n} · {(med/1000).toFixed(1)}s</div>
    </td>
  );
}

function HeatTable({ rows, cols, stats, keyOf }){
  const live = rows.filter(r => cols.some(c => { const s = stats[keyOf(r, c)]; return s && s.n > 0; }));
  if (!live.length) return null;
  return (
    <table className="heat">
      <thead>
        <tr><th className="rowlab"></th>{cols.map(c => <th key={c.label}>{c.label}</th>)}</tr>
      </thead>
      <tbody>
        {live.map(r => (
          <tr key={r.label}>
            <td className="rowlab">{r.label}</td>
            {cols.map(c => <HeatCell key={c.label} s={stats[keyOf(r, c)]} title={r.label + ' · ' + c.label.toLowerCase()} />)}
          </tr>
        ))}
      </tbody>
    </table>
  );
}

function HeatMap({ stats }){
  const any = Object.keys(stats).some(k => stats[k].n > 0);
  if (!any) return null;
  return (
    <div className="panel">
      <div className="panel-title">PATTERN ACCURACY · cell text: % correct · median seconds</div>
      <HeatTable rows={TRI_ROWS} cols={TRI_COLS} stats={stats}
                 keyOf={(r, c) => patKey('tri', r.role, c.side, c.d)} />
      <HeatTable rows={HEAT_ROWS} cols={HEAT_COLS} stats={stats}
                 keyOf={(r, c) => patKey(r.t, r.role, c.side, c.dir)} />
      <div className="legend">
        weak
        <span className="sw" style={{background:'var(--heat-w3)'}}></span>
        <span className="sw" style={{background:'var(--heat-w2)'}}></span>
        <span className="sw" style={{background:'var(--heat-w1)'}}></span>
        <span className="sw" style={{background:'var(--heat-mid)'}}></span>
        <span className="sw" style={{background:'var(--heat-s1)'}}></span>
        <span className="sw" style={{background:'var(--heat-s2)'}}></span>
        <span className="sw" style={{background:'var(--heat-s3)'}}></span>
        strong · neutral band 70–80% · weak patterns come back sooner
      </div>
    </div>
  );
}

function Summary({ history, stats, onRestart, onMenu }){
  useEffect(() => {
    const h = (e) => {
      if (e.key === 'r' || e.key === 'R' || e.key === 'Enter'){ e.preventDefault(); onRestart(); }
      if (e.key === 'l' || e.key === 'L' || e.key === 'Escape'){ e.preventDefault(); onMenu(); }
    };
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, [onRestart, onMenu]);
  const n = history.length, okN = history.filter(x => x.ok).length;
  let best = 0, cur = 0;
  history.forEach(x => { cur = x.ok ? cur+1 : 0; if (cur > best) best = cur; });
  const okTimes = history.filter(x => x.ok).map(x => x.ms);
  const fastest = okTimes.length ? Math.min.apply(null, okTimes) : null;
  const med = okTimes.length ? median(okTimes) : null;
  return (
    <div>
      <div className="tiles">
        <div className="tile"><div className="v">{okN}/{n}</div><div className="l">CORRECT</div></div>
        <div className="tile"><div className="v">{best}</div><div className="l">BEST STREAK</div></div>
        <div className="tile"><div className="v">{fastest != null ? (fastest/1000).toFixed(2)+'s' : '—'}</div><div className="l">BEST TIME</div></div>
        <div className="tile"><div className="v">{med != null ? (med/1000).toFixed(2)+'s' : '—'}</div><div className="l">MEDIAN (OK)</div></div>
      </div>
      <HeatMap stats={stats} />
      <div className="keysbar btnrow" style={{justifyContent:'center'}}>
        <button type="button" className="btn primary" onClick={onRestart}>RUN AGAIN ▸&nbsp;&nbsp;R</button>
        <button type="button" className="btn" onClick={onMenu}>LEVELS · L</button>
      </div>
    </div>
  );
}

function Menu({ speed, conv, inputMode, blind, onStart, onToggleSpeed, onToggleConv, onToggleInput, onToggleBlind, testResult }){
  useEffect(() => {
    const h = (e) => {
      if (e.key >= '1' && e.key <= '5'){ e.preventDefault(); onStart(+e.key); }
      if (e.key === 's' || e.key === 'S'){ e.preventDefault(); onToggleSpeed(); }
      if (e.key === 'o' || e.key === 'O'){ e.preventDefault(); onToggleConv(); }
      if (e.key === 't' || e.key === 'T'){ e.preventDefault(); onToggleInput(); }
      if (e.key === 'v' || e.key === 'V'){ e.preventDefault(); onToggleBlind(); }
    };
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, [onStart, onToggleSpeed, onToggleConv, onToggleInput, onToggleBlind]);
  return (
    <div className="menu">
      {testResult.failed.length > 0 &&
        <div className="testfail">{'SELF-TESTS FAILED (' + testResult.failed.length + '/' + testResult.count + ')\n' + testResult.failed.join('\n')}</div>}
      <div className="panel">
        <div className="panel-title">ONE PRICE MOVES — RE-QUOTE THE IMPLIED. PICK A LEVEL:</div>
        {LEVELS.map(l => (
          <div key={l.n} className="lvl" style={{cursor:'pointer'}} onClick={() => onStart(l.n)}>
            <span className="num">{l.n}</span><span className="nm">{l.nm}</span><span className="ds">{l.ds}</span>
          </div>
        ))}
        <div className="opt">
          <span className="optbtn" onClick={onToggleSpeed}><b>S</b> speed: {speed ? 'ON · 10s' : 'off'}</span>
          <span className="optbtn" onClick={onToggleConv}><b>O</b> quotes: {conv === 'ob' ? 'OFFER / BID' : 'BID / OFFER'}</span>
          <span className="optbtn" onClick={onToggleInput}><b>T</b> answers: {inputMode === 'keys' ? '1–4 CHOICES' : 'TYPED'}</span>
          <span className="optbtn" onClick={onToggleBlind}><b>V</b> prices: {blind ? 'IN YOUR HEAD' : 'ON SCREEN'}</span>
        </div>
        <div className="opt">columns as on the desk grid: RECV (offer side, higher) · INST · PAY (bid side, lower) · prices marked ' are implieds, unmarked are live quotes · improve = tighter</div>
        <div className="opt">V mode: opening calls are read once, then the board disappears — every change is announced and you carry the prices</div>
        <div className="opt">triangle: 1Y offer 110 + 1x2 offer 5 → implied 2Y offer 115; a 114 bid prints → 1Y bid 109, 1x2 bid 4 — the Δ passes 1:1</div>
        <div className="opt">answer like "51 1/2 / 50 5/8" or "51.5/50.625" or just fractions "5/8 / 1/2" · U = unchanged · all prices tick in 1/8 bp</div>
      </div>
    </div>
  );
}

function App(){
  const [phase, setPhase] = useState('menu');
  const [level, setLevel] = useState(1);
  const [speed, setSpeed] = useState(false);
  const [conv, setConv] = useState('ob');                  // offer/bid, per desk convention
  const [inputMode, setInputMode] = useState('keys');      // one-keypress answers by default
  const [blind, setBlind] = useState(false);               // prices announced once, then held in your head
  const [roundId, setRoundId] = useState(1);
  const [lastHistory, setLastHistory] = useState([]);
  const statsRef = useRef({});                             // session-only, no persistence
  const [testResult] = useState(() => {
    const r = runTests();
    if (r.failed.length) console.error('SHIFT self-tests failed:', r.failed);
    window.__TESTS = r;
    return r;
  });
  return (
    <div className="app">
      <div className="hdr">
        <h1>SHIFT</h1>
        <span className="sub">implied price shift trainer · {conv === 'ob' ? 'offer/bid' : 'bid/offer'} · 1/8 ticks</span>
      </div>
      {phase === 'menu' &&
        <Menu speed={speed} conv={conv} inputMode={inputMode} blind={blind} testResult={testResult}
              onStart={l => { setLevel(l); setRoundId(r => r+1); setPhase('drill'); }}
              onToggleSpeed={() => setSpeed(s => !s)}
              onToggleConv={() => setConv(c => c === 'ob' ? 'bo' : 'ob')}
              onToggleInput={() => setInputMode(m => m === 'keys' ? 'typed' : 'keys')}
              onToggleBlind={() => setBlind(b => !b)} />}
      {phase === 'drill' && (level === 1
        ? <TriangleDrill key={roundId} speed={speed} conv={conv} inputMode={inputMode} blind={blind} statsRef={statsRef}
                         onEnd={h => { setLastHistory(h); setPhase('summary'); }} />
        : <Drill key={roundId} level={level} speed={speed} conv={conv} inputMode={inputMode} blind={blind} statsRef={statsRef}
                 onEnd={h => { setLastHistory(h); setPhase('summary'); }} />)}
      {phase === 'summary' &&
        <Summary history={lastHistory} stats={statsRef.current}
                 onRestart={() => { setRoundId(r => r+1); setPhase('drill'); }}
                 onMenu={() => setPhase('menu')} />}
    </div>
  );
}

window.__APP_MOUNTED = true;
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
window.addEventListener('load', function(){
  setTimeout(function(){
    if (!window.__APP_MOUNTED)
      document.getElementById('root').innerHTML =
        '<div class="loadfail">Could not load React/Babel from the CDN — check your connection and reload.</div>';
  }, 1500);
});
</script>
</body>
</html>
