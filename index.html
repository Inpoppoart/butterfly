<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#05060a">
<title>IMPLIEDS — Pattern &amp; Rate Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05060a;--bg2:#0a0d16;--panel:#0d1120;--panel2:#131a2e;
  --border:#1d2740;--border2:#2b3a5e;--text:#cdd8f0;--muted:#5a6b92;
  --green:#39ff8b;--gold:#ffd23f;--cyan:#5bd1ff;--red:#ff4d5e;
  --pixel:"Press Start 2P",monospace;--mono:"IBM Plex Mono",ui-monospace,monospace;
  --sans:Inter,-apple-system,system-ui,sans-serif;
}
html,body{height:100%}
body{background:radial-gradient(1400px 700px at 50% -10%,#0e1d38 0%,transparent 60%),var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
#fxCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}
#flash{position:fixed;inset:0;z-index:40;pointer-events:none;opacity:0;background:transparent}
#flash.on{animation:flashAnim .45s ease-out}
@keyframes flashAnim{0%{opacity:1}100%{opacity:0}}
.scanlines{position:fixed;inset:0;z-index:60;pointer-events:none;background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.09) 3px);mix-blend-mode:multiply}
.game{position:relative;z-index:10;max-width:480px;margin:0 auto;padding:.6rem .8rem 3rem}

.hud{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.55rem;gap:.5rem}
.rank-block{display:flex;gap:.45rem;align-items:center}
.rank-badge{width:44px;height:44px;display:grid;place-items:center;font-size:1.3rem;border-radius:10px;background:radial-gradient(circle at 30% 25%,#1c2c4a,#0c1424);border:1.5px solid var(--border2);color:var(--gold);box-shadow:0 0 14px rgba(255,210,63,.2),inset 0 0 10px rgba(0,0,0,.6)}
.rank-name{font-family:var(--pixel);font-size:.56rem;color:var(--green);letter-spacing:.02em;text-shadow:0 0 10px rgba(57,255,139,.5)}
.lvl-line{font-family:var(--pixel);font-size:.43rem;color:var(--muted);margin-top:4px}
.stats-block{display:flex;gap:.3rem}
.stat-tile{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:.32rem .45rem;text-align:center;min-width:46px}
.stat-val{font-family:var(--mono);font-size:1rem;font-weight:700;color:var(--green);line-height:1.1}
.stat-lbl{font-family:var(--pixel);font-size:.32rem;color:var(--muted);margin-top:3px;letter-spacing:.06em}

.xpbar{position:relative;height:18px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:.5rem}
.xpfill{height:100%;width:0%;background:linear-gradient(90deg,#1a6e44,var(--green));box-shadow:0 0 14px rgba(57,255,139,.45);transition:width .5s cubic-bezier(.2,.9,.3,1)}
.xptext{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-size:.57rem;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);letter-spacing:.05em}

.modes{display:flex;gap:.22rem;margin-bottom:.55rem}
.mode-btn{flex:1;padding:.45rem .1rem;font-family:var(--pixel);font-size:.4rem;letter-spacing:.01em;border:1.5px solid var(--border2);border-radius:7px;background:var(--panel);color:var(--muted);cursor:pointer;transition:all .12s;white-space:nowrap}
.mode-btn:hover{color:var(--text);border-color:var(--cyan)}
.mode-btn.active{color:var(--bg);background:var(--green);border-color:var(--green);box-shadow:0 0 14px rgba(57,255,139,.4)}
#boardBtn{color:var(--gold)!important;border-color:rgba(255,210,63,.4)}
#boardBtn.active{background:var(--gold)!important;border-color:var(--gold)!important;color:var(--bg)!important}

.board-panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:.6rem;margin-bottom:.5rem}
.board-head{font-family:var(--pixel);font-size:.43rem;color:var(--gold);letter-spacing:.06em;margin-bottom:.55rem;display:flex;justify-content:space-between;align-items:baseline}
.board-meta{font-size:.32rem;color:var(--muted)}
.board-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.3rem}
.bchip{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:.3rem .15rem;text-align:center}
.bchip .bk{font-family:var(--pixel);font-size:.4rem;color:var(--cyan);letter-spacing:.02em}
.bchip .bp{font-family:var(--mono);font-size:.72rem;font-weight:700;color:var(--text);margin-top:3px}
.bchip.hot{border-color:var(--gold);box-shadow:0 0 10px rgba(255,210,63,.35)}
.bchip.hot .bp{color:var(--gold)}

.stage{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1.5px solid var(--border2);border-radius:14px;padding:.85rem;box-shadow:0 0 0 1px rgba(0,0,0,.4),0 18px 44px rgba(0,0,0,.55),inset 0 0 32px rgba(91,209,255,.03);transition:border-color .3s,box-shadow .3s;margin-bottom:.45rem}
.stage.glow-good{border-color:var(--green);box-shadow:0 0 0 1px rgba(0,0,0,.4),0 0 32px rgba(57,255,139,.4),inset 0 0 48px rgba(57,255,139,.08)}
.stage.glow-bad{border-color:var(--red);box-shadow:0 0 0 1px rgba(0,0,0,.4),0 0 32px rgba(255,77,94,.4),inset 0 0 48px rgba(255,77,94,.08)}
.stage-eyebrow{font-family:var(--pixel);font-size:.42rem;letter-spacing:.1em;color:var(--cyan);text-align:center;margin-bottom:.6rem;opacity:.8}

.quotes-row{display:flex;flex-wrap:wrap;gap:.38rem;justify-content:center;min-height:2.4rem;margin-bottom:.55rem}
.qchip{font-family:var(--mono);font-weight:700;font-size:.9rem;padding:.4rem .6rem;border-radius:8px;border:1px solid;display:inline-flex;flex-direction:column;align-items:flex-start;gap:1px}
.qchip.bid{background:rgba(57,255,139,.07);border-color:rgba(57,255,139,.38);color:var(--green)}
.qchip.offer{background:rgba(255,77,94,.07);border-color:rgba(255,77,94,.38);color:var(--red)}
.qchip-top{display:flex;align-items:baseline;gap:.4rem}
.qchip-px{font-family:var(--mono);font-size:.95rem;font-weight:700;color:var(--gold)}
.qchip-tag{font-family:var(--pixel);font-size:.3rem;letter-spacing:.04em;text-transform:uppercase;opacity:.55;margin-top:2px}

/* Easy-mode rate cards */
.easy-cards{display:flex;gap:.55rem;justify-content:center;align-items:center;padding:.1rem 0 .3rem}
.easy-card{background:var(--bg2);border:1.5px solid rgba(255,210,63,.45);border-radius:12px;padding:.6rem .95rem;text-align:center;min-width:88px}
.easy-card .ec-tenor{font-family:var(--pixel);font-size:.48rem;color:var(--gold);letter-spacing:.05em;margin-bottom:.4rem}
.easy-card .ec-rate{font-family:var(--mono);font-size:1.45rem;font-weight:700;color:var(--text)}
.easy-card .ec-side{font-family:var(--pixel);font-size:.36rem;color:var(--cyan);letter-spacing:.08em;margin-top:.4rem}
.easy-card.far{border-color:rgba(91,209,255,.55)}
.easy-sep{font-family:var(--mono);font-size:1.8rem;font-weight:700;color:var(--gold);line-height:1;padding-top:.5rem}
.easy-label{font-family:var(--pixel);font-size:.4rem;color:var(--text);text-align:center;margin-top:.45rem;letter-spacing:.04em;opacity:.85}

.tempo-bar{height:6px;border-radius:3px;background:var(--bg2);border:1px solid var(--border);overflow:hidden;margin-bottom:.55rem}
.tempo-fill{height:100%;width:100%;background:linear-gradient(90deg,var(--cyan),var(--green))}
.tempo-fill.hot{background:linear-gradient(90deg,var(--red),#ff8a3d);animation:tHot .5s infinite}
@keyframes tHot{0%,100%{opacity:1}50%{opacity:.5}}

.q-text{font-family:var(--pixel);font-size:.5rem;color:var(--cyan);text-align:center;padding:.4rem 0 .65rem;line-height:1.7;letter-spacing:.04em}

.opts{display:flex;flex-direction:column;gap:.38rem}
.opt{width:100%;text-align:left;font-family:var(--mono);font-size:1rem;font-weight:600;padding:.65rem .85rem;border-radius:9px;border:1.5px solid var(--border2);background:var(--panel2);color:var(--text);cursor:pointer;transition:all .1s;display:flex;justify-content:space-between;align-items:center}
.opt:hover{border-color:var(--cyan);box-shadow:0 0 12px rgba(91,209,255,.18)}
.opt-tag{font-family:var(--pixel);font-size:.33rem;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-weight:400}
.opt.correct{background:rgba(57,255,139,.1);border-color:var(--green);color:var(--green)}
.opt.wrong{background:rgba(255,77,94,.1);border-color:var(--red);color:var(--red)}
.opt.dim{opacity:.25;pointer-events:none}

.brow{display:flex;align-items:center;gap:.32rem;flex-wrap:wrap;padding:.45rem 0;border-bottom:1px solid var(--border)}
.brow:last-child{border-bottom:none}
.b-sel{font-family:var(--pixel);font-size:.34rem;border:1px solid var(--border2);border-radius:6px;padding:.28rem .3rem;background:var(--bg2);color:var(--text);height:36px;cursor:pointer;outline:none}
.b-x{font-family:var(--mono);color:var(--muted);font-size:.8rem}
.b-sides{display:flex;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.b-sd{font-family:var(--pixel);font-size:.36rem;padding:.18rem .42rem;height:36px;border:none;background:var(--bg2);color:var(--muted);cursor:pointer;transition:all .1s}
.b-sd+.b-sd{border-left:1px solid var(--border2)}
.b-sd.bid.on{background:var(--green);color:var(--bg)}
.b-sd.offer.on{background:var(--red);color:#fff}
.b-del{width:30px;height:30px;border-radius:6px;border:1px solid var(--border2);background:var(--bg2);color:var(--muted);cursor:pointer;font-size:.9rem;line-height:1;transition:all .1s}
.b-del:hover{border-color:var(--red);color:var(--red)}

.actions{display:flex;gap:.38rem;margin-top:.65rem;flex-wrap:wrap}
.btn{font-family:var(--pixel);font-size:.46rem;padding:.6rem 1rem;border-radius:9px;cursor:pointer;border:1.5px solid transparent;transition:all .12s;letter-spacing:.02em}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(180deg,#52ffaa,var(--green));border-color:var(--green);color:var(--bg);box-shadow:0 0 18px rgba(57,255,139,.38);flex:1}
.btn-primary:hover{filter:brightness(1.1)}
.btn-ghost{background:var(--panel2);border-color:var(--border2);color:var(--text)}
.btn-ghost:hover{border-color:var(--cyan)}
.note{font-family:var(--pixel);font-size:.38rem;color:var(--red);margin-top:.45rem;min-height:1px;letter-spacing:.03em;text-align:center}

/* Rate phase */
.rate-line{font-family:var(--mono);font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:.4rem}
.rate-line b{color:var(--cyan)}
.rate-hint{font-family:var(--pixel);font-size:.34rem;color:var(--muted);text-align:center;margin-bottom:.55rem;letter-spacing:.04em;opacity:.7}
.answer-wrap{display:flex;align-items:baseline;justify-content:center;gap:.4rem;margin:.2rem 0 .55rem}
.answer-unit{font-family:var(--pixel);font-size:.45rem;color:var(--muted);letter-spacing:.04em}
.answer-disp{font-family:var(--mono);font-weight:700;font-size:1.7rem;color:var(--green);background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;padding:.4rem .9rem;min-width:170px;text-align:center;text-shadow:0 0 12px rgba(57,255,139,.4)}
.answer-disp.empty{color:var(--muted);text-shadow:none}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;max-width:300px;margin:0 auto}
.key{font-family:var(--mono);font-size:1.2rem;font-weight:700;padding:.65rem 0;border-radius:10px;border:1.5px solid var(--border2);background:var(--panel2);color:var(--text);cursor:pointer;transition:all .08s}
.key:hover{border-color:var(--cyan)}
.key:active{transform:scale(.94);background:var(--panel)}
.key.enter{grid-column:span 3;font-family:var(--pixel);font-size:.55rem;background:linear-gradient(180deg,#52ffaa,var(--green));border-color:var(--green);color:var(--bg);box-shadow:0 0 16px rgba(57,255,139,.35)}
.key.fn{color:var(--gold)}.key.del{color:var(--red)}

.verdict-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.verdict{font-family:var(--pixel);font-size:.6rem;letter-spacing:.03em;display:flex;align-items:center;gap:.42rem}
.verdict .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.verdict.right{color:var(--green)}.verdict.right .dot{background:var(--green);box-shadow:0 0 10px var(--green)}
.verdict.wrong2{color:var(--red)}.verdict.wrong2 .dot{background:var(--red);box-shadow:0 0 10px var(--red)}
.rt-text{font-family:var(--mono);font-size:.72rem;color:var(--muted)}

.ladder{margin:.45rem auto;max-width:360px}
.lrow{display:grid;grid-template-columns:1fr 58px 1fr;align-items:center;min-height:26px;border-top:1px solid var(--border)}
.lrow.head{min-height:20px;border-top:none}
.lhd{font-family:var(--pixel);font-size:.3rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.lrcv{text-align:right;padding-right:8px}.lpay{text-align:left;padding-left:8px}
.lnum{text-align:center;font-family:var(--pixel);font-size:.42rem;border-left:1px solid var(--border);border-right:1px solid var(--border);color:var(--cyan)}
.mk{font-family:var(--mono);font-weight:700;font-size:.9rem;margin:0 1px;transition:opacity .5s ease;display:inline-block}
.mk.recv{color:var(--green);text-shadow:0 0 6px rgba(57,255,139,.55)}
.mk.pay{color:var(--red);text-shadow:0 0 6px rgba(255,77,94,.55)}
.mk.gone{opacity:.08}.mk.live{animation:mPulse 1.1s ease 1}
@keyframes mPulse{0%{transform:scale(1)}28%{transform:scale(1.55)}100%{transform:scale(1)}}

.model-chips{display:flex;flex-wrap:wrap;gap:.38rem;margin:.55rem 0;align-items:center;justify-content:center}
.m-label{font-family:var(--pixel);font-size:.32rem;color:var(--muted);margin-right:2px}
.m-plus{font-family:var(--mono);color:var(--muted);font-size:.9rem;margin:0 .1rem}
.mchip{font-family:var(--mono);font-weight:700;font-size:.8rem;padding:.28rem .5rem;border-radius:7px;border:1px solid;display:inline-flex;flex-direction:column;align-items:flex-start}
.mchip.bid{background:rgba(57,255,139,.08);border-color:rgba(57,255,139,.3);color:var(--green)}
.mchip.offer{background:rgba(255,77,94,.08);border-color:rgba(255,77,94,.3);color:var(--red)}
.mchip-px{font-size:.72rem;font-weight:700;color:var(--gold);margin-left:.3rem}
.mchip-tag{font-family:var(--pixel);font-size:.28rem;letter-spacing:.03em;text-transform:uppercase;opacity:.5;margin-top:1px}

.rate-result{font-family:var(--mono);font-size:.92rem;text-align:center;margin:.4rem 0;font-weight:700}
.rate-result .lbl{font-family:var(--pixel);font-size:.4rem;color:var(--muted);display:block;margin-bottom:.3rem;letter-spacing:.05em}
.rate-result .ok{color:var(--green)}.rate-result .you{color:var(--red);font-size:.82rem}
.work{font-family:var(--mono);font-size:.82rem;color:var(--text);background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:.55rem .7rem;margin:.5rem 0;line-height:1.9}
.work .hl{color:var(--gold);font-weight:700}.work .gr{color:var(--green);font-weight:700}
.explain{font-family:var(--mono);font-size:.74rem;color:var(--muted);margin:.4rem 0 0;line-height:1.65}

.intro-panel{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1.5px solid rgba(255,210,63,.35);border-radius:14px;padding:.85rem;box-shadow:0 0 24px rgba(255,210,63,.1);margin-bottom:.45rem}
.intro-eyebrow{font-family:var(--pixel);font-size:.4rem;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem}
.intro-text{font-family:var(--mono);font-size:.76rem;color:var(--text);line-height:1.6;margin:0 0 .5rem}

.tempo-toggle{display:flex;align-items:center;justify-content:center;margin:.2rem 0 .5rem}
.tempo-toggle label{font-family:var(--pixel);font-size:.36rem;color:var(--muted);display:flex;align-items:center;gap:.38rem;cursor:pointer;letter-spacing:.04em}
.tempo-toggle input[type=checkbox]{width:13px;height:13px;accent-color:var(--green);cursor:pointer}

.popup{position:fixed;pointer-events:none;z-index:100;font-family:var(--pixel);font-weight:700;animation:popRise 1.3s ease-out forwards;text-shadow:0 2px 8px rgba(0,0,0,.9)}
.popup.good{color:var(--gold);font-size:.72rem}.popup.bad{color:var(--red);font-size:.8rem}
@keyframes popRise{0%{opacity:0;transform:translateY(0) scale(.65)}18%{opacity:1;transform:translateY(-14px) scale(1.12)}100%{opacity:0;transform:translateY(-80px) scale(1)}}
.hidden{display:none!important}
</style>
</head>
<body>
<canvas id="fxCanvas"></canvas>
<div id="flash"></div>
<div class="scanlines"></div>

<main class="game">
  <header class="hud">
    <div class="rank-block">
      <div class="rank-badge" id="rankBadge">◆</div>
      <div><div class="rank-name" id="rankName">TRAINEE</div><div class="lvl-line">LVL <span id="levelNum">1</span>/6</div></div>
    </div>
    <div class="stats-block">
      <div class="stat-tile"><div class="stat-val" id="statStreak">0</div><div class="stat-lbl">STREAK</div></div>
      <div class="stat-tile"><div class="stat-val" id="statAcc">—</div><div class="stat-lbl">ACC</div></div>
      <div class="stat-tile"><div class="stat-val" id="statRT">—</div><div class="stat-lbl">MED RT</div></div>
    </div>
  </header>

  <div class="xpbar"><div class="xpfill" id="xpFill"></div><span class="xptext" id="xpText">LEVEL 1</span></div>

  <div class="modes">
    <button class="mode-btn active" data-mode="adaptive">AUTO</button>
    <button class="mode-btn" data-mode="easy">EASY</button>
    <button class="mode-btn" data-mode="medium">MED</button>
    <button class="mode-btn" data-mode="hard">HARD</button>
    <button class="mode-btn" id="boardBtn">📋</button>
  </div>

  <div id="boardPanel" class="board-panel hidden">
    <div class="board-head"><span>CURVE — MID (BPS)</span><span class="board-meta">spreads &amp; flies in bps</span></div>
    <div class="board-grid" id="boardGrid"></div>
  </div>

  <!-- Quotes (always visible) -->
  <section class="stage" id="quotesSection">
    <div class="stage-eyebrow" id="stageEyebrow">YOU'RE QUOTED</div>
    <div class="quotes-row" id="quotes"></div>
    <div class="tempo-bar hidden" id="tempoBar"><div class="tempo-fill" id="tempoFill"></div></div>
  </section>

  <!-- Trial: identify implied -->
  <section class="stage" id="trialSection">
    <div class="q-text" id="qText"></div>
    <div id="trialArea"></div>
    <div id="callActions" class="actions hidden">
      <button class="btn btn-ghost" id="addStructBtn">+ LEG</button>
      <button class="btn btn-primary" id="checkBtn">CHECK</button>
    </div>
    <div class="note" id="note"></div>
  </section>

  <!-- Rate: price it -->
  <section class="stage hidden" id="rateSection">
    <div class="q-text" id="rateQText">NOW PRICE IT</div>
    <div class="rate-line" id="rateLine"></div>
    <div class="rate-hint" id="rateHint"></div>
    <div class="answer-wrap"><div class="answer-disp empty" id="answerDisp">0</div><span class="answer-unit">bps</span></div>
    <div class="keypad" id="keypad"></div>
    <div class="note" id="rateNote"></div>
  </section>

  <!-- Result -->
  <section class="stage hidden" id="resultSection">
    <div class="verdict-row"><div class="verdict" id="verdict"></div><div class="rt-text" id="rtText"></div></div>
    <div class="ladder" id="ladder"></div>
    <div class="model-chips" id="modelChips"></div>
    <div class="rate-result" id="rateResult"></div>
    <div class="work" id="work"></div>
    <p class="explain" id="explain"></p>
    <div class="actions"><button class="btn btn-primary" id="nextBtn">NEXT →</button></div>
  </section>

  <!-- Intro -->
  <section class="intro-panel hidden" id="introSection">
    <div class="intro-eyebrow" id="introEyebrow">NEW PATTERN</div>
    <p class="intro-text" id="introText"></p>
    <div class="ladder" id="introLadder"></div>
    <div class="model-chips" id="introChips"></div>
    <div class="actions"><button class="btn btn-primary" id="introGoBtn">GOT IT — LET'S GO</button></div>
  </section>

  <div class="tempo-toggle"><label><input type="checkbox" id="tempoCheck"> TEMPO TIMER</label></div>
</main>

<script>
(function(){
'use strict';
function $(id){return document.getElementById(id);}

// ===================== MARKET DATA =====================
// Curve mid levels in basis points (a normal, rising swap curve).
// Spreads (far−near) are positive; butterflies are genuinely signed.
var TEN=[
 {k:'1m',px:380},{k:'6m',px:383},{k:'9m',px:387},{k:'1y',px:391},
 {k:'18m',px:398},{k:'2y',px:405},{k:'3y',px:417},{k:'4y',px:427},
 {k:'5y',px:435},{k:'6y',px:443},{k:'7y',px:450},{k:'8y',px:457},

  prob.model.forEach(function(s){s.t.forEach(function(t){ts[t]=1;});});
  var arr=Object.keys(ts).map(Number);var lo=Math.min.apply(null,arr),hi=Math.max.apply(null,arr);
  var span=hi-lo+1;
  var maxStart=TEN.length-span;if(maxStart<0){lo=1;hi=Math.min(TEN.length,span);maxStart=0;}
  var start=ri(0,Math.max(0,maxStart));

  prob.map=map;prob.lo=lo;prob.hi=hi;
}
function lbl(prob,t){return prob.map[t]?prob.map[t].k.toUpperCase():String(t);}

    '<span class="qchip-top">'+joinT(prob,l.t)+'<span class="qchip-px">'+signed(pr)+'</span></span>'+

}

function buildMaps(quotes){
  var recv={},pay={},lo=1e9,hi=0;
  quotes.forEach(function(l){var c=contrib(l);for(var k in c){var w=c[k];if(w>0)recv[k]=(recv[k]||0)+w;else pay[k]=(pay[k]||0)-w;}lo=Math.min(lo,Math.min.apply(null,l.t));hi=Math.max(hi,Math.max.apply(null,l.t));});

// ===================== PROBLEM GEN =====================
function genProblem(d,cat0,wantSpot){
  for(var a=0;a<60;a++){
    var pool=poolFrom();
    var res=pickResidual(cat0,wantSpot?Math.min(d,4):d,pool);
    if(!res)continue;
    if(wantSpot){res=[res[0]];res[0].size=1;}
    var prob=constructQuotes(res,tgtLegs(d,cat0),pool);
    if(prob){prob.cat=cat0;mapReal(prob);return prob;}
  }
  var fb=constructQuotes([{type:'spread',t:[2,5],side:'bid',size:1}],2,[2,3,4,5,6]);mapReal(fb);return fb;
}

// ===================== SELECTION =====================
function effD(){return mode==='adaptive'?ST.d:(mode==='easy'?1:mode==='medium'?3:6);}
function chooseCat(d){
  var av=unlocked(d);
  var fresh=av.filter(function(c){return (!ST.introduced[c]&&!isAtomic(c))||(!ST.introduced[c]&&c==='fly');});
  if(fresh.length)return fresh[0];
  var weights=av.map(function(c){var s=catSt(c).str;var w=(1-s)+0.15;if(c===lastMiss)w+=0.6;if(recent.length&&recent[recent.length-1]===c)w*=0.3;if(recent.slice(-2).every(function(x){return x===c;}))w*=0.2;return w;});
  var tot=weights.reduce(function(a,b){return a+b;},0),r=Math.random()*tot;
  for(var i=0;i<av.length;i++){r-=weights[i];if(r<=0)return av[i];}
  return av[av.length-1];
}

  if(spot){renderSpot();}else{renderCall();}
  var lim=tempoOn?tempoMs(d):0;
  setTempo(lim);
  startT=performance.now();
}

// Easy mode: show two real tenor rates, ask player to compute the spread
function startEasyTrial(){
  // Pick near and far tenor (gap 1-4 steps to keep arithmetic reasonable)
  var aIdx=ri(0,TEN.length-3);
  var gap=ri(1,Math.min(4,TEN.length-2-aIdx));
  var bIdx=aIdx+gap;
  var tenA=TEN[aIdx],tenB=TEN[bIdx];
  // Spread rate: far - near (always positive on normal curve)
  var spreadRate=Math.round((tenB.px-tenA.px)*10000)/10000;

  cur={easyMode:true,tenA:tenA,tenB:tenB,rateAns:spreadRate,cat:'spread',d:1,idCorrect:true,format:'easy'};

  // Highlight the two tenors in the board if it's open
  document.querySelectorAll('.bchip').forEach(function(el){el.classList.remove('hot');});
  document.querySelectorAll('.bchip').forEach(function(el){
    var k=el.querySelector('.bk');
    if(k&&(k.textContent===tenA.k.toUpperCase()||k.textContent===tenB.k.toUpperCase()))el.classList.add('hot');
  });

  // Show the two rate cards in the quotes row
  var FA=tenB.k.toUpperCase(),NE=tenA.k.toUpperCase();
  $('stageEyebrow').textContent='RATE DRILL · SPREAD';
  $('quotes').innerHTML=
    '<div class="easy-cards">'+
    '<div class="easy-card far"><div class="ec-tenor">'+FA+'</div><div class="ec-rate">'+fmt(tenB.px)+'</div><div class="ec-side">FAR</div></div>'+
    '<div class="easy-sep">−</div>'+
    '<div class="easy-card"><div class="ec-tenor">'+NE+'</div><div class="ec-rate">'+fmt(tenA.px)+'</div><div class="ec-side">NEAR</div></div>'+
    '</div>'+
    '<div class="easy-label">'+FA+' − '+NE+' = the '+NE+'×'+FA+' spread</div>';
  $('tempoBar').classList.add('hidden');
  $('quotesSection').classList.remove('hidden');

  // Skip trial section — go straight to rate entry
  rateInput='';updateRateDisp();$('rateNote').textContent='';
  cur.rateStart=performance.now();
  startT=performance.now();
  $('rateQText').textContent='PRICE THE SPREAD';
  $('rateLine').innerHTML='What is the <b>'+NE+'×'+FA+'</b> spread? &nbsp;<span style="opacity:.7">('+FA+' − '+NE+')</span>';
  $('rateHint').textContent='Far minus near — bigger tenor first · always positive';
  showSection('rate');
}

function setTempo(lim){
  clearTimeout(tmrId);var bar=$('tempoBar'),fill=$('tempoFill');
  if(!lim){bar.classList.add('hidden');return;}
  bar.classList.remove('hidden');fill.className='tempo-fill';fill.style.width='100%';fill.style.transition='none';
  requestAnimationFrame(function(){requestAnimationFrame(function(){fill.style.transition='width '+lim+'ms linear';fill.style.width='0%';if(lim<=12000)fill.classList.add('hot');});});
  tmrId=setTimeout(function(){if(!answered)finalize(false,false,lim,true);},lim);
}

function renderSpot(){
  $('qText').textContent='STEP 1 · TAP THE IMPLIED';
  $('callActions').classList.add('hidden');
  var opts=shuf([cur.answer].concat(distractors(cur.answer,poolFrom())));
  cur.options=opts;
  $('trialArea').innerHTML='<div class="opts">'+opts.map(function(o,i){
    return '<button class="opt" data-i="'+i+'"><span>'+(o.size>1?o.size+'× ':'')+joinT(cur,o.t)+' '+o.side+'</span><span class="opt-tag">'+catName(o.type)+'</span></button>';
  }).join('')+'</div>';
  $('trialArea').querySelectorAll('.opt').forEach(function(b){b.addEventListener('click',function(){if(answered)return;spotAnswer(+b.dataset.i,b);});});
}
function spotAnswer(i,el){
  var correct=sameNet(netOf([structToLeg(cur.options[i])]),cur.net);
  $('trialArea').querySelectorAll('.opt').forEach(function(b,j){var o=cur.options[j];var ok=sameNet(netOf([structToLeg(o)]),cur.net);if(ok)b.classList.add('correct');else b.classList.add('dim');if(j===i&&!ok)b.classList.replace('dim','wrong');});
  doFlash(correct);spawnPopup(correct?'+IMPLIED':'MISS',correct,el);
  cur.idCorrect=correct;
  setTimeout(function(){goRate();},650);
}

function renderCall(){
  $('qText').textContent='STEP 1 · BUILD THE IMPLIED';
  $('callActions').classList.remove('hidden');
  builder=[{type:'spread',t:['',''],side:'bid',size:1}];
  renderBuilder();
}
function tenorOptions(sel){
  var o='<option value="">—</option>';
  for(var t=cur.lo;t<=cur.hi;t++){o+='<option value="'+t+'"'+(String(sel)===String(t)?' selected':'')+'>'+lbl(cur,t)+'</option>';}
  return o;
}
function renderBuilder(){
  var allowFly=unlocked(cur.d).indexOf('fly')>=0;
  var allowSize=cur.d>=5;
  var h=builder.map(function(b,i){
    var ar=b.type==='fly'?3:2,tin='';
    for(var k=0;k<ar;k++){if(k)tin+='<span class="b-x">×</span>';tin+='<select class="b-sel b-ten" data-i="'+i+'" data-k="'+k+'">'+tenorOptions(b.t[k])+'</select>';}
    return '<div class="brow"><select class="b-sel" data-i="'+i+'" data-f="type"><option value="spread"'+(b.type==='spread'?' selected':'')+'>spread</option>'+(allowFly?'<option value="fly"'+(b.type==='fly'?' selected':'')+'>fly</option>':'')+'</select>'+tin+
      '<div class="b-sides"><button class="b-sd bid'+(b.side==='bid'?' on':'')+'" data-i="'+i+'" data-side="bid">BID</button><button class="b-sd offer'+(b.side==='offer'?' on':'')+'" data-i="'+i+'" data-side="offer">OFR</button></div>'+
      (allowSize?'<input class="b-sel" style="width:42px;text-align:center" data-i="'+i+'" data-f="size" inputmode="numeric" value="'+(b.size||1)+'" title="lots">':'')+
      (builder.length>1?'<button class="b-del" data-del="'+i+'">×</button>':'')+'</div>';
  }).join('');
  $('trialArea').innerHTML=h;
  $('trialArea').querySelectorAll('select[data-f="type"]').forEach(function(s){s.addEventListener('change',function(){var i=+s.dataset.i;builder[i].type=s.value;if(s.value==='fly'&&builder[i].t.length<3)builder[i].t[2]='';renderBuilder();});});
  $('trialArea').querySelectorAll('.b-ten').forEach(function(el){el.addEventListener('change',function(){builder[+el.dataset.i].t[+el.dataset.k]=el.value;});});
  $('trialArea').querySelectorAll('input[data-f="size"]').forEach(function(el){el.addEventListener('input',function(){builder[+el.dataset.i].size=el.value;});});
  $('trialArea').querySelectorAll('.b-sd').forEach(function(b){b.addEventListener('click',function(){if(answered)return;builder[+b.dataset.i].side=b.dataset.side;renderBuilder();});});
  $('trialArea').querySelectorAll('[data-del]').forEach(function(b){b.addEventListener('click',function(){builder.splice(+b.dataset.del,1);renderBuilder();});});
}
function doCheck(){
  if(answered)return;
  var structs=[];
  for(var i=0;i<builder.length;i++){
    var b=builder[i],ar=b.type==='fly'?3:2,t=[],seen={};
    for(var k=0;k<ar;k++){var v=parseInt(b.t[k],10);if(!v){$('note').textContent='Pick all tenors.';return;}if(seen[v]){$('note').textContent='Tenors must be distinct.';return;}seen[v]=1;t.push(v);}
    t.sort(function(x,y){return x-y;});
    var sz=cur.d>=5?(parseInt(b.size,10)||1):1;
    structs.push({type:b.type,t:t,side:b.side,size:sz});
  }
  var legs=structs.map(structToLeg);
  var correct=sameNet(netOf(legs),cur.net)&&mergeLegs(legs).length<=cur.model.length;
  doFlash(correct);spawnPopup(correct?'+IMPLIED':'MISS',correct,$('checkBtn'));
  cur.idCorrect=correct;cur.playerStructs=structs;
  setTimeout(function(){goRate();},500);
}

// ===================== RATE PHASE =====================
function goRate(){
  rateInput='';updateRateDisp();$('rateNote').textContent='';
  cur.rateAns=rateOfNet(cur.net,cur.map);
  cur.rateStart=performance.now();
  var name=cur.model.map(function(s){return joinT(cur,s.t)+' '+s.side;}).join(' + ');
  $('rateQText').textContent='NOW PRICE IT';
  $('rateLine').innerHTML='What rate does the implied <b>'+name+'</b> trade?';
  $('rateHint').textContent='Add each rate as shown · an offer flips its sign';
  showSection('rate');
  var lim=tempoOn?tempoMs(effD()):0;setTempo(lim);
}
function updateRateDisp(){var d=$('answerDisp');if(rateInput===''||rateInput==='-'){d.textContent=rateInput===''?'0':'−';d.classList.toggle('empty',rateInput==='');}else{d.textContent=rateInput.replace('-','−');d.classList.remove('empty');}}
function buildKeypad(){
  var keys=[['7'],['8'],['9'],['4'],['5'],['6'],['1'],['2'],['3'],['±','fn'],['0'],['.','fn'],['⌫','del'],['ENTER','enter']];
  $('keypad').innerHTML=keys.map(function(k){var cls=k[1]==='enter'?'key enter':k[1]==='del'?'key del':k[1]==='fn'?'key fn':'key';return '<button class="'+cls+'" data-k="'+k[0]+'">'+k[0]+'</button>';}).join('');
  $('keypad').querySelectorAll('.key').forEach(function(b){b.addEventListener('click',function(){press(b.dataset.k);});});
}
function press(k){
  if(answered){if(k==='ENTER')startTrial();return;}
  if(k==='ENTER'){submitRate();return;}
  if(k==='⌫'){rateInput=rateInput.slice(0,-1);updateRateDisp();return;}
  if(k==='±'){rateInput=rateInput.charAt(0)==='-'?rateInput.slice(1):'-'+rateInput;updateRateDisp();return;}
  if(k==='.'){if(rateInput.indexOf('.')<0)rateInput=(rateInput===''||rateInput==='-')?rateInput+'0.':rateInput+'.';updateRateDisp();return;}
  if(rateInput.replace('-','').replace('.','').length>=7)return;
  rateInput+=k;updateRateDisp();
}
window.addEventListener('keydown',function(e){
  if($('rateSection').classList.contains('hidden'))return;
  if(e.key>='0'&&e.key<='9')press(e.key);
  else if(e.key==='.')press('.');else if(e.key==='-')press('±');
  else if(e.key==='Backspace'){e.preventDefault();press('⌫');}
  else if(e.key==='Enter'){e.preventDefault();press('ENTER');}
});
function submitRate(){
  if(rateInput===''||rateInput==='-'){$('rateNote').textContent='Enter the rate.';return;}
  var val=parseFloat(rateInput);if(isNaN(val)){$('rateNote').textContent='Invalid number.';return;}
  var tol=cur.easyMode?0.5:0.13;
  var rateCorrect=Math.abs(val-cur.rateAns)<=tol;
  var rt=performance.now()-startT;
  doFlash(rateCorrect);spawnPopup(rateCorrect?'+'+fmt(cur.rateAns):'MISS',rateCorrect,$('answerDisp'));
  finalize(cur.idCorrect,rateCorrect,rt,false,val);
}

// ===================== FINALIZE =====================
function finalize(idCorrect,rateCorrect,rt,timedOut,rateVal){
  answered=true;clearTimeout(tmrId);$('tempoBar').classList.add('hidden');
  var correct=idCorrect&&rateCorrect;
  var c=cur.cat,C=catSt(c);
  C.att++;ST.totAtt++;
  if(correct){C.cor++;ST.totCor++;ST.streak++;if(ST.streak>ST.bestStreak)ST.bestStreak=ST.streak;}
  else{ST.streak=0;lastMiss=c;}
  C.str=C.str*0.7+(correct?0.3:0);
  if(correct&&!timedOut){C.rt.push(rt);if(C.rt.length>30)C.rt.shift();ST.rtAll.push(rt);if(ST.rtAll.length>60)ST.rtAll.shift();if(ST.bestRT==null||rt<ST.bestRT)ST.bestRT=rt;}
  recent.push(c);if(recent.length>6)recent.shift();
  if(mode==='adaptive'){win.push(correct?1:0);if(win.length>10)win.shift();sinceChange++;
    if(win.length>=8&&sinceChange>=5){var acc=win.reduce(function(a,b){return a+b;},0)/win.length;if(acc>=0.85&&ST.d<6){ST.d++;sinceChange=0;win=[];}else if(acc<0.6&&ST.d>1){ST.d--;sinceChange=0;win=[];}}}
  save();renderScore();renderLevelbar();
  showSection('result');

  var v=$('verdict');
  var label=timedOut?'TIME.':(correct?'CLEAN.':(idCorrect?'RATE OFF.':(rateCorrect?'SHAPE OFF.':'MISS.')));
  v.className='verdict '+(correct?'right':'wrong2');
  v.innerHTML='<span class="dot"></span>'+label;
  $('rtText').textContent=timedOut?'':(rt/1000).toFixed(2)+'s';

  // Easy mode: simplified result — just show the arithmetic
  if(cur.easyMode){
    $('ladder').innerHTML='';
    $('modelChips').innerHTML='';
    var rr0='<span class="lbl">SPREAD RATE</span><span class="ok">+'+fmt(cur.rateAns)+'</span>';
    if(!correct&&rateVal!=null)rr0+=' <span class="you">(you: '+signed(rateVal)+')</span>';
    $('rateResult').innerHTML=rr0;
    $('work').innerHTML=
      cur.tenB.k.toUpperCase()+' <span class="hl">'+fmt(cur.tenB.px)+'</span>'+
      '  −  '+
      cur.tenA.k.toUpperCase()+' <span class="hl">'+fmt(cur.tenA.px)+'</span>'+
      '<br>= <span class="gr">+'+fmt(cur.rateAns)+'</span>';
    $('explain').textContent='Spread = far tenor minus near tenor. Always positive on a normal curve.';
    $('nextBtn').focus();
    return;
  }

  // Implied game result
  renderLadder($('ladder'),cur,true);
  modelChips($('modelChips'),cur);
  var rr='<span class="lbl">IMPLIED RATE</span><span class="ok">'+signed(cur.rateAns)+'</span>';
  if(!correct&&!timedOut&&rateVal!=null&&!rateCorrect)rr+=' <span class="you">(you: '+fmt(rateVal)+')</span>';
  $('rateResult').innerHTML=rr;
  // Worked solution: each leg's rate as shown, with the offer flip applied, then summed.
  var legs=mergeLegs(cur.quotes);
  var parts=legs.map(function(l){
    var shown=intrinsicRate(l,cur.map);          // the rate on its chip
    var into=rateOfLeg(l,cur.map);               // what it contributes (offer flips sign)
    var flip=l.side==='offer'?' <span style="color:var(--muted)">→ flip →</span> <span class="hl">'+signed(into)+'</span>':'';
    return '<span style="color:var(--muted)">'+joinT(cur,l.t)+' '+l.side+'</span> <span class="hl">'+signed(shown)+'</span>'+flip;
  });
  $('work').innerHTML='Take each rate as shown; an offer flips its sign; then add:<br>'+parts.join('<br>')+'<br>= <span class="gr">'+signed(cur.rateAns)+'</span>';
  var m=buildMaps(cur.quotes),cancelled=[];
  for(var t=m.lo;t<=m.hi;t++){if(Math.min(m.recv[t]||0,m.pay[t]||0)>0)cancelled.push(lbl(cur,t));}
  var ex=cancelled.length?('The '+cancelled.join(', ')+' leg'+(cancelled.length>1?'s':'')+' cancel. '):'';
  ex+='What survives: '+cur.model.map(function(s){return joinT(cur,s.t)+' '+s.side+' ('+catName(s.type)+')';}).join(', plus ')+'.';
  if(!idCorrect&&cur.playerStructs){var pn=mergeLegs(cur.playerStructs.map(structToLeg));if(pn.length)ex+=' Your shape: '+describe(netOf(pn)).map(function(s){return joinT(cur,s.t)+' '+s.side;}).join(' + ')+'.';}
  $('explain').textContent=ex;
  $('nextBtn').focus();
}

// ===================== INTRO =====================
function showIntro(c,d){
  var prob=genProblem(d,c,false);cur=prob;cur.cat=c;
  renderQuotes(prob);
  $('stageEyebrow').textContent='WORKED EXAMPLE · '+catName(c).toUpperCase();
  showSection('intro');
  $('introEyebrow').textContent='NEW PATTERN — '+catName(c).toUpperCase();
  var lead={fly:'Two adjacent spreads sharing a tenor collapse into a butterfly — the shared leg cancels twice.',multiSpread:'Several spreads that don\'t share a cancelling belly stay separate — read each pairing.',doubleFly:'Two butterflies at different points on the curve. Each is its own wings-and-belly.',compound:'A mix — a butterfly plus a spread. Pull out the fly first, then read the spread.'}[c]||'';
  $('introText').textContent=lead+' Then you\'ll price it from the board.';
  renderLadder($('introLadder'),prob,false);
  setTimeout(function(){var s=$('introLadder').querySelectorAll('.mk:not(.gone)');for(var i=0;i<s.length;i++)s[i].classList.add('live');},120);
  modelChips($('introChips'),prob);
}

// ===================== BOARD =====================
function renderBoard(){
  $('boardGrid').innerHTML=TEN.map(function(t){return '<div class="bchip"><div class="bk">'+t.k.toUpperCase()+'</div><div class="bp">'+fmt(t.px)+'</div></div>';}).join('');
}
function median(a){if(!a.length)return null;var s=a.slice().sort(function(x,y){return x-y;}),m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;}
function renderScore(){$('statStreak').textContent=ST.streak;$('statAcc').textContent=ST.totAtt?Math.round(100*ST.totCor/ST.totAtt)+'%':'—';$('statRT').textContent=ST.rtAll.length?(median(ST.rtAll)/1000).toFixed(1)+'s':'—';}
function renderLevelbar(){var d=effD();$('rankBadge').textContent=RANK_BADGES[Math.min(d-1,5)];$('rankName').textContent=RANKS[Math.min(d-1,5)];$('levelNum').textContent=d;$('xpFill').style.width=(d/6*100)+'%';$('xpText').textContent=(mode==='adaptive'?'AUTO':'FIXED')+' LVL '+d+'/6 — '+unlocked(d).map(catName).join(' · ').toUpperCase();}

// ===================== WIRING =====================
document.querySelectorAll('.mode-btn[data-mode]').forEach(function(b){b.addEventListener('click',function(){mode=b.dataset.mode;document.querySelectorAll('.mode-btn[data-mode]').forEach(function(x){x.classList.toggle('active',x===b);});win=[];sinceChange=0;tempoOn=$('tempoCheck').checked;startTrial();});});
$('boardBtn').addEventListener('click',function(){var p=$('boardPanel'),show=p.classList.contains('hidden');p.classList.toggle('hidden');$('boardBtn').classList.toggle('active',show);if(show)renderBoard();});
$('checkBtn').addEventListener('click',doCheck);
$('addStructBtn').addEventListener('click',function(){if(builder.length<4){builder.push({type:'spread',t:['',''],side:'bid',size:1});renderBuilder();}});
$('nextBtn').addEventListener('click',startTrial);
$('introGoBtn').addEventListener('click',function(){ST.introduced[cur.cat]=true;save();startTrial();});
$('tempoCheck').addEventListener('change',function(){tempoOn=$('tempoCheck').checked;});

// boot
buildKeypad();renderBoard();renderScore();startTrial();
})();
</script>
