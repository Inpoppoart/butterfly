<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#05060a">
<title>IMPLIEDS — Pattern Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#05060a;
  --bg2:#0a0d16;
  --panel:#0d1120;
  --panel2:#131a2e;
  --border:#1d2740;
  --border2:#2b3a5e;
  --text:#cdd8f0;
  --muted:#5a6b92;
  --green:#39ff8b;
  --gold:#ffd23f;
  --cyan:#5bd1ff;
  --red:#ff4d5e;
  --pixel:"Press Start 2P",monospace;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
  --sans:Inter,-apple-system,system-ui,sans-serif;
}

html,body{height:100%}
body{
  background:radial-gradient(1400px 700px at 50% -10%,#0e1d38 0%,transparent 60%),var(--bg);
  color:var(--text);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* FX layers */
#fxCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}
#flash{position:fixed;inset:0;z-index:40;pointer-events:none;opacity:0;background:transparent}
#flash.on{animation:flashAnim .45s ease-out}
@keyframes flashAnim{0%{opacity:1}100%{opacity:0}}
.scanlines{
  position:fixed;inset:0;z-index:60;pointer-events:none;
  background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.09) 3px);
  mix-blend-mode:multiply
}

/* Layout */
.game{
  position:relative;z-index:10;
  max-width:480px;margin:0 auto;
  padding:.6rem .8rem 3rem;
}

/* HUD */
.hud{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.55rem;gap:.5rem}
.rank-block{display:flex;gap:.45rem;align-items:center}
.rank-badge{
  width:44px;height:44px;display:grid;place-items:center;
  font-size:1.3rem;border-radius:10px;
  background:radial-gradient(circle at 30% 25%,#1c2c4a,#0c1424);
  border:1.5px solid var(--border2);color:var(--gold);
  box-shadow:0 0 14px rgba(255,210,63,.2),inset 0 0 10px rgba(0,0,0,.6)
}
.rank-name{
  font-family:var(--pixel);font-size:.56rem;
  color:var(--green);letter-spacing:.02em;
  text-shadow:0 0 10px rgba(57,255,139,.5)
}
.lvl-line{font-family:var(--pixel);font-size:.43rem;color:var(--muted);margin-top:4px}
.stats-block{display:flex;gap:.3rem}
.stat-tile{
  background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:.32rem .45rem;
  text-align:center;min-width:46px
}
.stat-val{
  font-family:var(--mono);font-size:1rem;font-weight:700;
  color:var(--green);line-height:1.1
}
.stat-lbl{font-family:var(--pixel);font-size:.32rem;color:var(--muted);margin-top:3px;letter-spacing:.06em}

/* XP bar */
.xpbar{
  position:relative;height:18px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:9px;overflow:hidden;margin-bottom:.5rem
}
.xpfill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#1a6e44,var(--green));
  box-shadow:0 0 14px rgba(57,255,139,.45);
  transition:width .5s cubic-bezier(.2,.9,.3,1)
}
.xptext{
  position:absolute;inset:0;display:grid;place-items:center;
  font-family:var(--mono);font-size:.57rem;font-weight:700;
  color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);
  letter-spacing:.05em
}

/* Modes */
.modes{display:flex;gap:.22rem;margin-bottom:.55rem}
.mode-btn{
  flex:1;padding:.45rem .1rem;
  font-family:var(--pixel);font-size:.4rem;
  letter-spacing:.01em;
  border:1.5px solid var(--border2);border-radius:7px;
  background:var(--panel);color:var(--muted);
  cursor:pointer;transition:all .12s;white-space:nowrap
}
.mode-btn:hover{color:var(--text);border-color:var(--cyan)}
.mode-btn.active{
  color:var(--bg);background:var(--green);
  border-color:var(--green);
  box-shadow:0 0 14px rgba(57,255,139,.4)
}
#masteryBtn{color:var(--gold)!important;border-color:rgba(255,210,63,.4)}
#masteryBtn.active{background:var(--gold)!important;border-color:var(--gold)!important;color:var(--bg)!important}

/* Mastery panel */
.mastery-panel{
  background:var(--panel);border:1px solid var(--border);
  border-radius:10px;padding:.75rem;margin-bottom:.5rem
}
.mastery-head{
  font-family:var(--pixel);font-size:.43rem;color:var(--gold);
  letter-spacing:.06em;margin-bottom:.6rem;
  display:flex;justify-content:space-between;align-items:baseline
}
.mastery-meta{font-size:.32rem;color:var(--muted)}
.mline{display:flex;align-items:center;gap:.45rem;margin:.38rem 0}
.mname{font-family:var(--pixel);font-size:.36rem;color:var(--text);width:88px;flex-shrink:0;text-transform:capitalize}
.mtrack{flex:1;height:8px;border-radius:4px;background:var(--bg2);border:1px solid var(--border);overflow:hidden}
.mfill{height:100%;background:var(--green);transition:width .35s}
.mval{font-family:var(--mono);font-size:.64rem;color:var(--muted);width:74px;text-align:right;flex-shrink:0}
.mline.locked{opacity:.28}

/* Stage card */
.stage{
  background:linear-gradient(180deg,var(--panel),var(--bg2));
  border:1.5px solid var(--border2);border-radius:14px;
  padding:.85rem;
  box-shadow:0 0 0 1px rgba(0,0,0,.4),0 18px 44px rgba(0,0,0,.55),inset 0 0 32px rgba(91,209,255,.03);
  transition:border-color .3s,box-shadow .3s;
  margin-bottom:.45rem
}
.stage.glow-good{
  border-color:var(--green);
  box-shadow:0 0 0 1px rgba(0,0,0,.4),0 0 32px rgba(57,255,139,.4),inset 0 0 48px rgba(57,255,139,.08)
}
.stage.glow-bad{
  border-color:var(--red);
  box-shadow:0 0 0 1px rgba(0,0,0,.4),0 0 32px rgba(255,77,94,.4),inset 0 0 48px rgba(255,77,94,.08)
}

.stage-eyebrow{
  font-family:var(--pixel);font-size:.42rem;
  letter-spacing:.1em;color:var(--cyan);
  text-align:center;margin-bottom:.6rem;opacity:.8
}

/* Quote chips */
.quotes-row{
  display:flex;flex-wrap:wrap;gap:.38rem;
  justify-content:center;min-height:2.4rem;margin-bottom:.55rem
}
.qchip{
  font-family:var(--mono);font-weight:700;font-size:.92rem;
  padding:.4rem .65rem;border-radius:8px;border:1px solid;
  display:inline-flex;flex-direction:column;align-items:flex-start;gap:1px
}
.qchip.bid{
  background:rgba(57,255,139,.07);
  border-color:rgba(57,255,139,.38);color:var(--green)
}
.qchip.offer{
  background:rgba(255,77,94,.07);
  border-color:rgba(255,77,94,.38);color:var(--red)
}
.qchip-px{
  font-size:.7rem;font-weight:700;
  letter-spacing:.02em;text-transform:uppercase;
  margin-left:.35rem;opacity:.85
}
.qchip-tag{
  font-family:var(--pixel);font-size:.3rem;
  letter-spacing:.04em;text-transform:uppercase;opacity:.5;margin-top:1px
}

/* Tempo */
.tempo-bar{
  height:6px;border-radius:3px;
  background:var(--bg2);border:1px solid var(--border);
  overflow:hidden;margin-bottom:.55rem
}
.tempo-fill{height:100%;width:100%;background:linear-gradient(90deg,var(--cyan),var(--green))}
.tempo-fill.run{transition:width linear}
.tempo-fill.hot{background:linear-gradient(90deg,var(--red),#ff8a3d);animation:tHot .5s infinite}
@keyframes tHot{0%,100%{opacity:1}50%{opacity:.5}}

/* Question text */
.q-text{
  font-family:var(--pixel);font-size:.5rem;
  color:var(--cyan);text-align:center;
  padding:.4rem 0 .65rem;line-height:1.7;
  letter-spacing:.04em
}

/* Spot options */
.opts{display:flex;flex-direction:column;gap:.38rem}
.opt{
  width:100%;text-align:left;
  font-family:var(--mono);font-size:1rem;font-weight:600;
  padding:.65rem .85rem;border-radius:9px;
  border:1.5px solid var(--border2);background:var(--panel2);color:var(--text);
  cursor:pointer;transition:all .1s;
  display:flex;justify-content:space-between;align-items:center
}
.opt:hover{border-color:var(--cyan);box-shadow:0 0 12px rgba(91,209,255,.18)}
.opt-tag{font-family:var(--pixel);font-size:.33rem;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-weight:400}
.opt.correct{background:rgba(57,255,139,.1);border-color:var(--green);color:var(--green)}
.opt.wrong{background:rgba(255,77,94,.1);border-color:var(--red);color:var(--red)}
.opt.dim{opacity:.25;pointer-events:none}

/* Builder */
.brow{
  display:flex;align-items:center;gap:.32rem;flex-wrap:wrap;
  padding:.45rem 0;border-bottom:1px solid var(--border)
}
.brow:last-child{border-bottom:none}
.b-sel{
  font-family:var(--pixel);font-size:.36rem;
  border:1px solid var(--border2);border-radius:6px;
  padding:.28rem .38rem;background:var(--bg2);color:var(--text);
  height:36px;cursor:pointer;outline:none
}
.b-inp{
  width:42px;height:36px;
  font-family:var(--mono);font-size:.95rem;font-weight:700;
  text-align:center;border:1px solid var(--border2);border-radius:6px;
  background:var(--bg2);color:var(--text);outline:none
}
.b-inp:focus{border-color:var(--green);box-shadow:0 0 8px rgba(57,255,139,.22)}
.b-x{font-family:var(--mono);color:var(--muted);font-size:.8rem}
.b-sides{display:flex;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.b-sd{
  font-family:var(--pixel);font-size:.36rem;
  padding:.18rem .42rem;height:36px;
  border:none;background:var(--bg2);color:var(--muted);cursor:pointer;transition:all .1s
}
.b-sd+.b-sd{border-left:1px solid var(--border2)}
.b-sd.bid.on{background:var(--green);color:var(--bg)}
.b-sd.offer.on{background:var(--red);color:#fff}
.b-del{
  width:30px;height:30px;border-radius:6px;
  border:1px solid var(--border2);background:var(--bg2);
  color:var(--muted);cursor:pointer;font-size:.9rem;line-height:1;
  transition:all .1s
}
.b-del:hover{border-color:var(--red);color:var(--red)}

/* Actions */
.actions{display:flex;gap:.38rem;margin-top:.65rem;flex-wrap:wrap}
.btn{
  font-family:var(--pixel);font-size:.46rem;
  padding:.6rem 1rem;border-radius:9px;
  cursor:pointer;border:1.5px solid transparent;
  transition:all .12s;letter-spacing:.02em
}
.btn:active{transform:scale(.96)}
.btn-primary{
  background:linear-gradient(180deg,#52ffaa,var(--green));
  border-color:var(--green);color:var(--bg);
  box-shadow:0 0 18px rgba(57,255,139,.38)
}
.btn-primary:hover{filter:brightness(1.1)}
.btn-ghost{
  background:var(--panel2);border-color:var(--border2);color:var(--text)
}
.btn-ghost:hover{border-color:var(--cyan)}

/* Note */
.note{
  font-family:var(--pixel);font-size:.38rem;
  color:var(--red);margin-top:.45rem;min-height:1px;letter-spacing:.03em
}

/* Result */
.verdict-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.verdict{
  font-family:var(--pixel);font-size:.66rem;
  letter-spacing:.03em;display:flex;align-items:center;gap:.42rem
}
.verdict .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.verdict.right{color:var(--green)}
.verdict.right .dot{background:var(--green);box-shadow:0 0 10px var(--green)}
.verdict.wrong2{color:var(--red)}
.verdict.wrong2 .dot{background:var(--red);box-shadow:0 0 10px var(--red)}
.rt-text{font-family:var(--mono);font-size:.75rem;color:var(--muted)}

/* Ladder */
.ladder{margin:.45rem 0;max-width:340px}
.lrow{display:grid;grid-template-columns:1fr 44px 1fr;align-items:center;min-height:26px;border-top:1px solid var(--border)}
.lrow.head{min-height:20px;border-top:none}
.lhd{font-family:var(--pixel);font-size:.3rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.lrcv{text-align:right;padding-right:8px}
.lpay{text-align:left;padding-left:8px}
.lnum{text-align:center;font-family:var(--mono);font-weight:700;font-size:.85rem;border-left:1px solid var(--border);border-right:1px solid var(--border);color:var(--text)}
.mk{font-family:var(--mono);font-weight:700;font-size:.9rem;margin:0 1px;transition:opacity .5s ease;display:inline-block}
.mk.recv{color:var(--green);text-shadow:0 0 6px rgba(57,255,139,.55)}
.mk.pay{color:var(--red);text-shadow:0 0 6px rgba(255,77,94,.55)}
.mk.gone{opacity:.08}
.mk.live{animation:mPulse 1.1s ease 1}
@keyframes mPulse{0%{transform:scale(1)}28%{transform:scale(1.55)}100%{transform:scale(1)}}

/* Model chips */
.model-chips{display:flex;flex-wrap:wrap;gap:.38rem;margin:.55rem 0;align-items:center}
.m-label{font-family:var(--pixel);font-size:.32rem;color:var(--muted);margin-right:2px}
.m-plus{font-family:var(--mono);color:var(--muted);font-size:.9rem;margin:0 .1rem}
.mchip{
  font-family:var(--mono);font-weight:700;font-size:.82rem;
  padding:.28rem .5rem;border-radius:7px;border:1px solid;
  display:inline-flex;flex-direction:column;align-items:flex-start
}
.mchip.bid{background:rgba(57,255,139,.08);border-color:rgba(57,255,139,.3);color:var(--green)}
.mchip.offer{background:rgba(255,77,94,.08);border-color:rgba(255,77,94,.3);color:var(--red)}
.mchip-px{font-size:.62rem;font-weight:700;letter-spacing:.02em;text-transform:uppercase;margin-left:.28rem;opacity:.82}
.mchip-tag{font-family:var(--pixel);font-size:.28rem;letter-spacing:.03em;text-transform:uppercase;opacity:.48;margin-top:1px}

/* Explain */
.explain{font-family:var(--mono);font-size:.74rem;color:var(--muted);margin:.5rem 0 0;line-height:1.65}

/* Intro panel */
.intro-panel{
  background:linear-gradient(180deg,var(--panel),var(--bg2));
  border:1.5px solid rgba(255,210,63,.35);border-radius:14px;
  padding:.85rem;
  box-shadow:0 0 24px rgba(255,210,63,.1);
  margin-bottom:.45rem
}
.intro-eyebrow{
  font-family:var(--pixel);font-size:.4rem;
  color:var(--gold);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:.5rem
}
.intro-text{font-family:var(--mono);font-size:.76rem;color:var(--text);line-height:1.6;margin:0 0 .5rem}

/* Tempo toggle */
.tempo-toggle{
  display:flex;align-items:center;justify-content:center;
  margin:.2rem 0 .5rem
}
.tempo-toggle label{
  font-family:var(--pixel);font-size:.36rem;
  color:var(--muted);display:flex;align-items:center;gap:.38rem;
  cursor:pointer;letter-spacing:.04em
}
.tempo-toggle input[type=checkbox]{width:13px;height:13px;accent-color:var(--green);cursor:pointer}

/* Popup FX */
.popup{
  position:fixed;pointer-events:none;z-index:100;
  font-family:var(--pixel);font-weight:700;
  animation:popRise 1.3s ease-out forwards;
  text-shadow:0 2px 8px rgba(0,0,0,.9)
}
.popup.good{color:var(--gold);font-size:.72rem}
.popup.bad{color:var(--red);font-size:.8rem}
@keyframes popRise{
  0%{opacity:0;transform:translateY(0) scale(.65)}
  18%{opacity:1;transform:translateY(-14px) scale(1.12)}
  100%{opacity:0;transform:translateY(-80px) scale(1)}
}

.hidden{display:none!important}
</style>
</head>
<body>
<canvas id="fxCanvas"></canvas>
<div id="flash"></div>
<div class="scanlines"></div>

<main class="game">
  <header class="hud">
    <div class="rank-block">
      <div class="rank-badge" id="rankBadge">◆</div>
      <div>
        <div class="rank-name" id="rankName">TRAINEE</div>
        <div class="lvl-line">LVL <span id="levelNum">1</span>/6</div>
      </div>
    </div>
    <div class="stats-block">
      <div class="stat-tile">
        <div class="stat-val" id="statStreak">0</div>
        <div class="stat-lbl">STREAK</div>
      </div>
      <div class="stat-tile">
        <div class="stat-val" id="statAcc">—</div>
        <div class="stat-lbl">ACC</div>
      </div>
      <div class="stat-tile">
        <div class="stat-val" id="statRT">—</div>
        <div class="stat-lbl">MED RT</div>
      </div>
    </div>
  </header>

  <div class="xpbar">
    <div class="xpfill" id="xpFill"></div>
    <span class="xptext" id="xpText">LEVEL 1 — SPREAD</span>
  </div>

  <div class="modes">
    <button class="mode-btn active" data-mode="adaptive">AUTO</button>
    <button class="mode-btn" data-mode="easy">EASY</button>
    <button class="mode-btn" data-mode="medium">MED</button>
    <button class="mode-btn" data-mode="hard">HARD</button>
    <button class="mode-btn" id="masteryBtn">📊</button>
  </div>

  <div id="masteryPanel" class="mastery-panel hidden">
    <div class="mastery-head">
      <span>MASTERY</span>
      <span class="mastery-meta" id="masteryMeta"></span>
    </div>
    <div id="masteryBody"></div>
  </div>

  <!-- Quotes always visible during game -->
  <section class="stage" id="quotesSection">
    <div class="stage-eyebrow" id="stageEyebrow">YOU'RE QUOTED</div>
    <div class="quotes-row" id="quotes"></div>
    <div class="tempo-bar hidden" id="tempoBar">
      <div class="tempo-fill" id="tempoFill"></div>
    </div>
  </section>

  <!-- Trial (question + answer area) -->
  <section class="stage" id="trialSection">
    <div class="q-text" id="qText"></div>
    <div id="trialArea"></div>
    <div id="callActions" class="actions hidden">
      <button class="btn btn-ghost" id="addStructBtn">+ STRUCTURE</button>
      <button class="btn btn-primary" id="checkBtn">CHECK</button>
    </div>
    <div class="note" id="note"></div>
  </section>

  <!-- Result -->
  <section class="stage hidden" id="resultSection">
    <div class="verdict-row">
      <div class="verdict" id="verdict"></div>
      <div class="rt-text" id="rtText"></div>
    </div>
    <div class="ladder" id="ladder"></div>
    <div class="model-chips" id="modelChips"></div>
    <p class="explain" id="explain"></p>
    <div class="actions">
      <button class="btn btn-primary" id="nextBtn">NEXT →</button>
    </div>
  </section>

  <!-- Intro (worked example) -->
  <section class="intro-panel hidden" id="introSection">
    <div class="intro-eyebrow" id="introEyebrow">NEW PATTERN</div>
    <p class="intro-text" id="introText"></p>
    <div class="ladder" id="introLadder"></div>
    <div class="model-chips" id="introChips"></div>
    <div class="actions">
      <button class="btn btn-primary" id="introGoBtn">GOT IT — LET'S GO</button>
    </div>
  </section>

  <div class="tempo-toggle">
    <label><input type="checkbox" id="tempoCheck" checked> TEMPO TIMER</label>
  </div>
</main>

<script>
(function(){
'use strict';

// ===================== VERIFIED ENGINE =====================
function contrib(l){var b=l.kind==='fwd'?[[l.t[0],1],[l.t[1],-1]]:[[l.t[0],1],[l.t[1],-2],[l.t[2],1]];var s=(l.side==='bid'?1:-1)*l.size,m={};b.forEach(function(p){m[p[0]]=(m[p[0]]||0)+p[1]*s;});return m;}
function netOf(legs){var n={};legs.forEach(function(l){var c=contrib(l);for(var k in c)n[k]=(n[k]||0)+c[k];});for(var k in n)if(n[k]===0)delete n[k];return n;}
function sameNet(a,b){var ks={};for(var k in a)ks[k]=1;for(var k2 in b)ks[k2]=1;for(var k3 in ks)if((a[k3]||0)!==(b[k3]||0))return false;return true;}
function ri(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function pick(a){return a[ri(0,a.length-1)];}
function shuf(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=ri(0,i),t=a[i];a[i]=a[j];a[j]=t;}return a;}
function legKey(l){return l.kind+':'+l.t.join(',')+':'+l.side;}
function mergeLegs(legs){var m={},o=[];legs.forEach(function(l){var k=legKey(l);if(!m[k]){m[k]={kind:l.kind,t:l.t.slice(),side:l.side,size:0};o.push(k);}m[k].size+=l.size;});return o.map(function(k){return m[k];}).filter(function(l){return l.size!==0;});}
function describe(net){
  var R=[],P=[];Object.keys(net).map(Number).sort(function(a,b){return a-b;}).forEach(function(t){var w=net[t];for(var i=0;i<Math.abs(w);i++)(w>0?R:P).push(t);});
  function cnt(a,t){var c=0;for(var i=0;i<a.length;i++)if(a[i]===t)c++;return c;} function rm(a,t){a.splice(a.indexOf(t),1);}
  var out=[],g=0;
  while(g++<200){var did=false;
    var pu=P.filter(function(v,i){return P.indexOf(v)===i;});
    for(var i=0;i<pu.length;i++){var b=pu[i];if(cnt(P,b)>=2){var bl=R.filter(function(x){return x<b;}),ab=R.filter(function(x){return x>b;});if(bl.length&&ab.length){var a=Math.max.apply(null,bl),c=Math.min.apply(null,ab);rm(R,a);rm(R,c);rm(P,b);rm(P,b);out.push({type:'fly',t:[a,b,c],side:'bid',size:1});did=true;break;}}}
    if(did)continue;
    var ru=R.filter(function(v,i){return R.indexOf(v)===i;});
    for(var j=0;j<ru.length;j++){var b2=ru[j];if(cnt(R,b2)>=2){var be=P.filter(function(x){return x<b2;}),av=P.filter(function(x){return x>b2;});if(be.length&&av.length){var a2=Math.max.apply(null,be),c2=Math.min.apply(null,av);rm(P,a2);rm(P,c2);rm(R,b2);rm(R,b2);out.push({type:'fly',t:[a2,b2,c2],side:'offer',size:1});did=true;break;}}}
    if(!did)break;
  }
  R.sort(function(a,b){return a-b;});P.sort(function(a,b){return a-b;});
  for(var k=0;k<Math.min(R.length,P.length);k++){var r=R[k],p=P[k];if(r<p)out.push({type:'spread',t:[r,p],side:'bid',size:1});else out.push({type:'spread',t:[p,r],side:'offer',size:1});}
  var m={},o=[];out.forEach(function(s){var key=s.type+':'+s.t.join(',')+':'+s.side;if(!m[key]){m[key]={type:s.type,t:s.t,side:s.side,size:0};o.push(key);}m[key].size+=s.size;});
  return o.map(function(k){return m[k];});
}
function structToLeg(s){return {kind:s.type==='fly'?'fly':'fwd',t:s.t.slice(),side:s.side,size:s.size||1};}
function dirSpread(x,y,sz){return x<y?{kind:'fwd',t:[x,y],side:'bid',size:sz}:{kind:'fwd',t:[y,x],side:'offer',size:sz};}
function decompose(S,pool){var k=S.size||1;
  if(S.type==='spread'){var d0,d1;if(S.side==='bid'){d0=S.t[0];d1=S.t[1];}else{d0=S.t[1];d1=S.t[0];}
    if(Math.random()<0.5)return[structToLeg(S)];
    var cand=pool.filter(function(p){return p!==d0&&p!==d1;});if(!cand.length)return[structToLeg(S)];
    var p=pick(cand);return[dirSpread(d0,p,k),dirSpread(p,d1,k)];}
  if(Math.random()<0.45)return[structToLeg(S)];
  var a=S.t[0],b=S.t[1],cv=S.t[2];
  if(S.side==='bid')return[dirSpread(a,b,k),dirSpread(cv,b,k)];
  return[dirSpread(b,a,k),dirSpread(b,cv,k)];
}
function splitOnce(legs,pool){var idx=[];legs.forEach(function(l,i){if(l.kind==='fwd')idx.push(i);});if(!idx.length)return false;
  var i=pick(idx),l=legs[i],d0,d1;if(l.side==='bid'){d0=l.t[0];d1=l.t[1];}else{d0=l.t[1];d1=l.t[0];}
  var cand=pool.filter(function(p){return p!==d0&&p!==d1;});if(!cand.length)return false;var p=pick(cand);
  legs.splice(i,1,dirSpread(d0,p,l.size),dirSpread(p,d1,l.size));return true;}
function noCancelPair(legs){for(var x=0;x<legs.length;x++)for(var y=x+1;y<legs.length;y++)if(legs[x].kind===legs[y].kind&&legs[x].t.join()===legs[y].t.join()&&legs[x].side!==legs[y].side&&legs[x].size===legs[y].size)return false;return true;}
function eachMatters(legs,net){for(var d=0;d<legs.length;d++){var sub=legs.filter(function(_,k){return k!==d;});if(sameNet(netOf(sub),net))return false;}return true;}
function constructQuotes(resStructs,tgt,pool){
  for(var att=0;att<300;att++){
    var legs=[];resStructs.forEach(function(S){legs=legs.concat(decompose(S,pool));});
    var guard=0;while(legs.length<tgt&&guard++<12){if(!splitOnce(legs,pool))break;}
    var net=netOf(resStructs.map(structToLeg));
    var merged=mergeLegs(legs);if(merged.length<2)continue;
    if(!sameNet(netOf(merged),net))continue;
    var model=describe(net);
    var mk=merged.map(legKey).sort().join('|'),modelk=model.map(structToLeg).map(legKey).sort().join('|');
    if(mk===modelk)continue;
    if(!noCancelPair(merged))continue;
    var single=false;merged.forEach(function(l){if(sameNet(contrib(l),net))single=true;});if(single)continue;
    if(!eachMatters(merged,net))continue;
    return {quotes:shuf(merged),model:model,net:net};
  }
  return null;
}
function poolFrom(){var base=ri(1,8),p=[];for(var i=0;i<7;i++)p.push(base+i);return p;}
function randTriple(pool){return shuf(pool).slice(0,3).sort(function(a,b){return a-b;});}
function randPair(pool){return shuf(pool).slice(0,2).sort(function(a,b){return a-b;});}
function pickResidual(cat,d,pool){var smax=d>=6?3:d>=5?2:1;
  if(cat==='spread')return[{type:'spread',t:randPair(pool),side:pick(['bid','offer']),size:Math.random()<0.82?1:ri(1,smax)}];
  if(cat==='fly')return[{type:'fly',t:randTriple(pool),side:pick(['bid','offer']),size:1}];
  if(cat==='multiSpread'){var n=d>=6?ri(2,3):2,seen={},out=[],g=0;while(out.length<n&&g++<40){var t=randPair(pool),k='s'+t.join();if(seen[k])continue;seen[k]=1;out.push({type:'spread',t:t,side:pick(['bid','offer']),size:1});}return out.length>=2?out:null;}
  if(cat==='doubleFly'){var seen2={},out2=[],g2=0;while(out2.length<2&&g2++<40){var t2=randTriple(pool),k2='f'+t2.join();if(seen2[k2])continue;seen2[k2]=1;out2.push({type:'fly',t:t2,side:pick(['bid','offer']),size:1});}return out2.length===2?out2:null;}
  return[{type:'fly',t:randTriple(pool),side:pick(['bid','offer']),size:1},{type:'spread',t:randPair(pool),side:pick(['bid','offer']),size:Math.random()<0.5?2:1}];
}
function sKey(s){return s.type+'|'+s.t.join(',')+'|'+s.side;}
function validS(s){var t=s.t;if(t.some(function(x){return x<1;}))return false;for(var i=1;i<t.length;i++)if(t[i]<=t[i-1])return false;return true;}
function flip(s){return s==='bid'?'offer':'bid';}
function distractors(answer,pool){
  var ansNet=netOf([structToLeg(answer)]),seen={};seen[sKey(answer)]=1;var out=[];
  function add(s){if(!s||!validS(s))return;var k=sKey(s);if(seen[k])return;if(sameNet(netOf([structToLeg(s)]),ansNet))return;seen[k]=1;out.push(s);}
  add({type:answer.type,t:answer.t.slice(),side:flip(answer.side)});
  var perturb=[];answer.t.forEach(function(_,i){[-1,1].forEach(function(dl){var t=answer.t.slice();t[i]+=dl;perturb.push({type:answer.type,t:t,side:answer.side});});});
  shuf(perturb).forEach(add);
  if(answer.type==='spread'){var a=answer.t[0],bv=answer.t[1];add({type:'fly',t:[a,bv,bv+1],side:answer.side});add({type:'fly',t:[a-1,a,bv],side:answer.side});}
  else{add({type:'spread',t:[answer.t[0],answer.t[2]],side:answer.side});add({type:'spread',t:[answer.t[0],answer.t[1]],side:answer.side});}
  var tries=0;while(out.length<6&&tries++<60){var ty=pick(['spread','fly']),ar=ty==='spread'?2:3,t=shuf(pool).slice(0,ar).sort(function(x,y){return x-y;});if(t.length<ar)continue;add({type:ty,t:t,side:pick(['bid','offer'])});}

// ===================== DIFFICULTY =====================
function unlocked(d){if(d<=2)return['spread'];if(d<=4)return['spread','fly'];if(d===5)return['spread','fly','multiSpread','doubleFly'];return['spread','fly','multiSpread','doubleFly','compound'];}
function isAtomic(c){return c==='spread'||c==='fly';}
function spotChance(d){return d<=2?1:d===3?0.85:d===4?0.55:d===5?0.3:0.2;}
function tempoMs(d){return d<=2?0:d===3?14000:d===4?11000:d===5?9000:7000;}
function tgtLegs(d,cat){var b=isAtomic(cat)?2:3;if(d>=6)b+=1;return b;}
function catName(c){return {spread:'Spread',fly:'Butterfly',multiSpread:'Multi-Spread',doubleFly:'Double Fly',compound:'Compound'}[c]||c;}
var RANKS=['TRAINEE','JUNIOR','ASSOCIATE','TRADER','SENIOR','PRINCIPAL'];
var RANK_BADGES=['◆','▲','★','◉','⬡','♦'];

function save(){try{localStorage.setItem('impl_v2',JSON.stringify(ST));}catch(e){}}

// ===================== CANVAS FX =====================
var canvas=$('fxCanvas'),ctx=canvas.getContext('2d');
var particles=[];
(function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;})();
window.addEventListener('resize',function(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;});

function spawnParticles(x,y,good){
  var color=good?'#39ff8b':'#ff4d5e';
  for(var i=0;i<20;i++){
    var ang=Math.random()*Math.PI*2,spd=2+Math.random()*5;
    particles.push({x:x,y:y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-2,alpha:1,color:color,r:1+Math.random()*2.5});
  }
}
(function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.alpha-=0.022;
    if(p.alpha<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(loop);
})();

function doFlash(good){
  var f=$('flash');
  f.style.background=good?'rgba(57,255,139,.07)':'rgba(255,77,94,.1)';
  f.classList.remove('on');void f.offsetWidth;f.classList.add('on');
  var qs=$('quotesSection'),ts=$('trialSection');
  [qs,ts].forEach(function(el){
    el.classList.remove('glow-good','glow-bad');
    el.classList.add(good?'glow-good':'glow-bad');
    setTimeout(function(){el.classList.remove('glow-good','glow-bad');},550);
  });
}

function spawnPopup(text,good,el){
  var p=document.createElement('div');
  p.className='popup '+(good?'good':'bad');
  p.textContent=text;
  var rect=el?el.getBoundingClientRect():{left:window.innerWidth/2-30,top:window.innerHeight/2,width:60,height:0};
  p.style.left=(rect.left+rect.width/2)+'px';
  p.style.top=(rect.top+rect.height/2)+'px';
  document.body.appendChild(p);
  if(el)spawnParticles(rect.left+rect.width/2,rect.top+rect.height/2,good);
  setTimeout(function(){if(p.parentNode)p.parentNode.removeChild(p);},1400);
}

// ===================== SELECTION =====================
function effD(){return mode==='adaptive'?ST.d:(mode==='easy'?1:mode==='medium'?3:6);}
function chooseCat(d){
  var av=unlocked(d);
  var fresh=av.filter(function(c){return (!ST.introduced[c]&&!isAtomic(c))||(!ST.introduced[c]&&c==='fly');});
  if(fresh.length)return fresh[0];
  var weights=av.map(function(c){var s=catSt(c).str;var w=(1-s)+0.15;if(c===lastMiss)w+=0.6;if(recent.length&&recent[recent.length-1]===c)w*=0.3;if(recent.slice(-2).every(function(x){return x===c;}))w*=0.2;return w;});
  var tot=weights.reduce(function(a,b){return a+b;},0),r=Math.random()*tot;
  for(var i=0;i<av.length;i++){r-=weights[i];if(r<=0)return av[i];}
  return av[av.length-1];
}

// ===================== RENDER =====================
function chipFor(l){
  var tn=l.kind==='fwd'?'spread':'butterfly';
  return '<span class="qchip '+l.side+'">'+l.t.join('×')+
    '<span class="qchip-px">'+l.side+(l.size>1?' ×'+l.size:'')+'</span>'+
    '<span class="qchip-tag">'+tn+'</span></span>';
}
function renderQuotes(quotes){$('quotes').innerHTML=mergeLegs(quotes).map(chipFor).join('');}

function buildMaps(quotes){
  var recv={},pay={},lo=99,hi=0;
  quotes.forEach(function(l){var c=contrib(l);for(var k in c){var w=c[k];if(w>0)recv[k]=(recv[k]||0)+w;else pay[k]=(pay[k]||0)-w;}lo=Math.min(lo,Math.min.apply(null,l.t));hi=Math.max(hi,Math.max.apply(null,l.t));});
  return{recv:recv,pay:pay,lo:lo,hi:hi};
}
function marks(total,cancel,cls){
  var s='';
  for(var i=0;i<total;i++)s+='<span class="mk '+cls+(i<cancel?' will-go':'')+'">X</span>';
  return s;
}
function renderLadder(el,quotes,animate){
  var m=buildMaps(quotes);
  var h='<div class="lrow head"><div class="lrcv lhd">receive</div><div class="lnum lhd">yr</div><div class="lpay lhd">pay</div></div>';
  for(var t=m.lo;t<=m.hi;t++){var r=m.recv[t]||0,p=m.pay[t]||0,cn=Math.min(r,p);h+='<div class="lrow"><div class="lrcv">'+marks(r,cn,'recv')+'</div><div class="lnum">'+t+'</div><div class="lpay">'+marks(p,cn,'pay')+'</div></div>';}
  el.innerHTML=h;
  var fade=function(){var g=el.querySelectorAll('.will-go');for(var i=0;i<g.length;i++)g[i].classList.add('gone');};
  var glow=function(){var s=el.querySelectorAll('.mk:not(.gone)');for(var i=0;i<s.length;i++)s[i].classList.add('live');};
  if(animate){requestAnimationFrame(function(){requestAnimationFrame(fade);});setTimeout(glow,580);}else{fade();}
}
function structChip(s){
  return '<span class="mchip '+s.side+'">'+
    (s.size>1?s.size+'× ':'')+s.t.join('×')+
    '<span class="mchip-px">'+s.side+'</span>'+
    '<span class="mchip-tag">'+catName(s.type)+'</span></span>';
}
function modelChips(el,model){
  el.innerHTML='<span class="m-label">implies</span>'+
    model.map(structChip).join('<span class="m-plus">+</span>');
}
function explainFor(quotes,model){
  var m=buildMaps(quotes),cancelled=[];
  for(var t=m.lo;t<=m.hi;t++){if(Math.min(m.recv[t]||0,m.pay[t]||0)>0)cancelled.push(t+'y');}
  var txt=cancelled.length?('The '+cancelled.join(', ')+' leg'+(cancelled.length>1?'s':'')+' cancel. '):'  ';
  txt+='What survives: '+model.map(function(s){return (s.size>1?s.size+'× ':'')+s.t.join('×')+' '+s.side+' ('+catName(s.type)+')';}).join(', plus ')+'.';
  return txt;
}

// ===================== PROBLEM GEN =====================
function genProblem(d,cat0,wantSpot){
  for(var a=0;a<60;a++){
    var pool=poolFrom();
    var res=pickResidual(cat0,wantSpot?Math.min(d,4):d,pool);
    if(!res)continue;
    if(wantSpot){res=[res[0]];res[0].size=1;}
    var prob=constructQuotes(res,tgtLegs(d,cat0),pool);
    if(prob){prob.cat=cat0;return prob;}
  }
  return constructQuotes([{type:'spread',t:[2,5],side:'bid',size:1}],2,[2,3,4,5,6]);
}

// ===================== TRIAL FLOW =====================
function showSection(which){
  // which: 'trial' | 'result' | 'intro'
  $('trialSection').classList.toggle('hidden', which!=='trial');
  $('resultSection').classList.toggle('hidden', which!=='result');
  $('introSection').classList.toggle('hidden', which!=='intro');
  $('quotesSection').classList.remove('hidden');
}

function startTrial(){
  answered=false;
  $('note').textContent='';
  showSection('trial');
  var d=effD();
  var c=chooseCat(d);
  if(!ST.introduced[c]&&c!=='spread'){
    showIntro(c,d);return;
  }
  var spot=isAtomic(c)&&Math.random()<spotChance(d);
  cur=genProblem(d,c,spot);
  cur.cat=c;cur.format=spot?'spot':'call';cur.d=d;
  cur.answer=spot?cur.model[0]:null;
  renderQuotes(cur.quotes);
  $('stageEyebrow').textContent='YOU\'RE QUOTED · '+catName(c).toUpperCase();
  renderLevelbar();
  if(spot){renderSpot();}else{renderCall();}
  var lim=tempoOn?tempoMs(d):0;
  if(mode==='easy')lim=0;
  setTempo(lim);
  startT=performance.now();
}

function setTempo(lim){
  clearTimeout(tmrId);
  var bar=$('tempoBar'),fill=$('tempoFill');
  if(!lim){bar.classList.add('hidden');return;}
  bar.classList.remove('hidden');
  fill.className='tempo-fill';
  fill.style.width='100%';
  fill.style.transition='none';
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      fill.style.transition='width '+lim+'ms linear';
      fill.style.width='0%';
      if(lim<=8000)fill.classList.add('hot');
    });
  });
  tmrId=setTimeout(function(){if(!answered)resolveTrial(false,lim,true);},lim);
}

function renderSpot(){
  $('qText').textContent='TAP THE IMPLIED';
  $('callActions').classList.add('hidden');
  var opts=shuf([cur.answer].concat(distractors(cur.answer,poolFrom())));
  cur.options=opts;
  $('trialArea').innerHTML='<div class="opts">'+opts.map(function(o,i){
    return '<button class="opt" data-i="'+i+'">'+
      '<span>'+(o.size>1?o.size+'× ':'')+o.t.join('×')+' '+o.side+'</span>'+
      '<span class="opt-tag">'+catName(o.type)+'</span></button>';
  }).join('')+'</div>';
  $('trialArea').querySelectorAll('.opt').forEach(function(b){
    b.addEventListener('click',function(){
      if(answered)return;
      spotAnswer(+b.dataset.i,b);
    });
  });
}

function spotAnswer(i,el){
  var rt=performance.now()-startT;
  var correct=sameNet(netOf([structToLeg(cur.options[i])]),cur.net);
  $('trialArea').querySelectorAll('.opt').forEach(function(b,j){
    var o=cur.options[j];
    var ok=sameNet(netOf([structToLeg(o)]),cur.net);
    if(ok)b.classList.add('correct');
    else b.classList.add('dim');
    if(j===i&&!ok)b.classList.replace('dim','wrong');
  });
  doFlash(correct);
  spawnPopup(correct?'+CORRECT':'MISS',correct,el);
  resolveTrial(correct,rt,false);
}

function renderCall(){
  $('qText').textContent='BUILD THE IMPLIED';
  $('callActions').classList.remove('hidden');
  builder=[{type:'spread',t:['',''],side:'bid',size:1}];
  renderBuilder();
}

  $('trialArea').querySelectorAll('input[data-f="size"]').forEach(function(el){

    b.addEventListener('click',function(){if(answered)return;builder[+b.dataset.i].side=b.dataset.side;renderBuilder();});
  });
  $('trialArea').querySelectorAll('[data-del]').forEach(function(b){
    b.addEventListener('click',function(){builder.splice(+b.dataset.del,1);renderBuilder();});
  });
}

function doCheck(){
  if(answered)return;
  var structs=[];
  for(var i=0;i<builder.length;i++){
    var b=builder[i],ar=b.type==='fly'?3:2,t=[],seen={};
    for(var k=0;k<ar;k++){var v=parseInt(b.t[k],10);if(!v){$('note').textContent='Fill in all tenors.';return;}if(seen[v]){$('note').textContent='Tenors must be distinct.';return;}seen[v]=1;t.push(v);}
    t.sort(function(x,y){return x-y;});
    var sz=cur.d>=5?(parseInt(b.size,10)||1):1;
    structs.push({type:b.type,t:t,side:b.side,size:sz});
  }
  var rt=performance.now()-startT;
  var legs=structs.map(structToLeg);
  var correct=sameNet(netOf(legs),cur.net)&&mergeLegs(legs).length<=cur.model.length;
  doFlash(correct);
  spawnPopup(correct?'+CORRECT':'MISS',correct,$('checkBtn'));
  resolveTrial(correct,rt,false,structs);
}

// ===================== RESOLVE =====================
function resolveTrial(correct,rt,timedOut,playerStructs){
  answered=true;clearTimeout(tmrId);
  $('tempoBar').classList.add('hidden');
  var c=cur.cat,C=catSt(c);
  C.att++;ST.totAtt++;
  if(correct){C.cor++;ST.totCor++;ST.streak++;if(ST.streak>ST.bestStreak)ST.bestStreak=ST.streak;}
  else{ST.streak=0;lastMiss=c;}
  C.str=C.str*0.7+(correct?0.3:0);
  if(correct&&!timedOut){
    C.rt.push(rt);if(C.rt.length>30)C.rt.shift();
    ST.rtAll.push(rt);if(ST.rtAll.length>60)ST.rtAll.shift();
    if(ST.bestRT==null||rt<ST.bestRT)ST.bestRT=rt;
  }
  recent.push(c);if(recent.length>6)recent.shift();
  if(mode==='adaptive'){
    win.push(correct?1:0);if(win.length>10)win.shift();sinceChange++;
    if(win.length>=8&&sinceChange>=5){
      var acc=win.reduce(function(a,b){return a+b;},0)/win.length;
      if(acc>=0.85&&ST.d<6){ST.d++;sinceChange=0;win=[];}
      else if(acc<0.6&&ST.d>1){ST.d--;sinceChange=0;win=[];}
    }
  }
  save();renderScore();renderLevelbar();

  showSection('result');
  var v=$('verdict');
  v.className='verdict '+(correct?'right':'wrong2');
  v.innerHTML='<span class="dot"></span>'+(timedOut?'TIME.':(correct?'RIGHT.':'MISS.'));
  $('rtText').textContent=timedOut?'':(rt/1000).toFixed(2)+'s';
  renderLadder($('ladder'),cur.quotes,true);
  modelChips($('modelChips'),cur.model);
  var ex=explainFor(cur.quotes,cur.model);
  if(!correct&&playerStructs){
    var pn=mergeLegs(playerStructs.map(structToLeg));
    if(pn.length)ex+=' Your package: '+describe(netOf(pn)).map(function(s){return (s.size>1?s.size+'× ':'')+s.t.join('×')+' '+s.side;}).join(' + ')+'.';
  }
  $('explain').textContent=ex;
  $('nextBtn').focus();
}

// ===================== INTRO =====================
function showIntro(c,d){
  var prob=genProblem(d,c,false);
  cur=prob;cur.cat=c;
  renderQuotes(prob.quotes);
  $('stageEyebrow').textContent='WORKED EXAMPLE · '+catName(c).toUpperCase();
  showSection('intro');
  $('introEyebrow').textContent='NEW PATTERN — '+catName(c).toUpperCase();
  var lead={
    fly:'Two adjacent spreads sharing a tenor collapse into a butterfly — the shared leg pays twice, so it shows as a doubled stack.',
    multiSpread:'Several spreads that don\'t share a cancelling belly stay as separate spreads — read each pairing off the pad.',
    doubleFly:'Two butterflies at different points on the curve. Each is its own wings-and-belly; together they\'re a double fly.',
    compound:'A mix — a butterfly plus a spread, sometimes in size. Pull out the fly first, then what\'s left is the spread.'
  }[c]||'';
  $('introText').textContent=lead;
  renderLadder($('introLadder'),prob.quotes,false);
  setTimeout(function(){
    var s=$('introLadder').querySelectorAll('.mk:not(.gone)');
    for(var i=0;i<s.length;i++)s[i].classList.add('live');
  },120);
  modelChips($('introChips'),prob.model);
}

// ===================== DASHBOARDS =====================
function median(a){if(!a.length)return null;var s=a.slice().sort(function(x,y){return x-y;});var m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;}
function renderScore(){
  $('statStreak').textContent=ST.streak;
  $('statAcc').textContent=ST.totAtt?Math.round(100*ST.totCor/ST.totAtt)+'%':'—';
  $('statRT').textContent=ST.rtAll.length?(median(ST.rtAll)/1000).toFixed(1)+'s':'—';
}
function renderLevelbar(){
  var d=effD();
  $('rankBadge').textContent=RANK_BADGES[Math.min(d-1,RANK_BADGES.length-1)];
  $('rankName').textContent=RANKS[Math.min(d-1,RANKS.length-1)];
  $('levelNum').textContent=d;
  $('xpFill').style.width=(d/6*100)+'%';
  var cats=unlocked(d).map(catName).join(' · ').toUpperCase();
  $('xpText').textContent=(mode==='adaptive'?'AUTO':'FIXED')+' LVL '+d+'/6 — '+cats;
}
function renderMastery(){
  var cats=['spread','fly','multiSpread','doubleFly','compound'];
  $('masteryMeta').textContent=ST.totAtt+' REPS · BEST '+(ST.bestRT?(ST.bestRT/1000).toFixed(1)+'s':'—');
  $('masteryBody').innerHTML=cats.map(function(c){
    var C=ST.cats[c],att=C?C.att:0,acc=att?Math.round(100*C.cor/att):0;
    var rt=C&&C.rt.length?(median(C.rt)/1000).toFixed(1)+'s':'—';
    var locked=att===0;
    var fillColor=acc>=80?'var(--green)':acc>=50?'var(--gold)':'var(--red)';
    return '<div class="mline'+(locked?' locked':'')+'">'+'<span class="mname">'+catName(c)+'</span>'+'<span class="mtrack"><span class="mfill" style="width:'+acc+'%;background:'+fillColor+'"></span></span>'+'<span class="mval">'+(att?acc+'% · '+rt:'locked')+'</span></div>';
  }).join('');
}

// ===================== WIRING =====================
document.querySelectorAll('.mode-btn[data-mode]').forEach(function(b){
  b.addEventListener('click',function(){
    mode=b.dataset.mode;
    document.querySelectorAll('.mode-btn[data-mode]').forEach(function(x){x.classList.toggle('active',x===b);});
    win=[];sinceChange=0;
    tempoOn=(mode!=='easy');
    $('tempoCheck').checked=tempoOn;
    startTrial();
  });
});
$('masteryBtn').addEventListener('click',function(){
  var p=$('masteryPanel'),show=p.classList.contains('hidden');
  p.classList.toggle('hidden');
  $('masteryBtn').classList.toggle('active',show);
  if(show)renderMastery();
});
$('checkBtn').addEventListener('click',doCheck);
$('addStructBtn').addEventListener('click',function(){
  if(builder.length<4){builder.push({type:'spread',t:['',''],side:'bid',size:1});renderBuilder();}
});
$('nextBtn').addEventListener('click',startTrial);
$('introGoBtn').addEventListener('click',function(){
  ST.introduced[cur.cat]=true;save();startTrial();
});
$('tempoCheck').addEventListener('change',function(){
  tempoOn=$('tempoCheck').checked;
});

// kick off
renderScore();
startTrial();

})();
</script>
